intake_questions:
  questions:
    - question: "Does your organization operate in a federated environment where multiple parties jointly contribute to service delivery without a strict hierarchical structure?"
      rationale: "FitSM was specifically designed for federated infrastructures. Federation changes how roles, responsibilities, and agreements are structured — particularly for OLAs, supplier management, and service portfolio coordination."
      signal: "Federation scope — affects PR01, PR02, PR22, PR23 complexity and role model design"

    - question: "Are you targeting FitSM certification or using FitSM as a stepping stone toward ISO/IEC 20000-1 certification?"
      rationale: "Certification goals determine how rigorously GR1-GR7 requirements must be documented and evidenced. ISO 20000 readiness requires additional documentation depth beyond FitSM minimums."
      signal: "Compliance tier — determines documentation depth and evidence requirements across all processes"

    - question: "Have you previously conducted a FitSM-6 maturity or capability assessment, and if so, what was the overall maturity level and which processes scored lowest?"
      rationale: "Existing assessment results identify specific process gaps and set a baseline for the documentation engagement. Low-scoring processes require more detailed process definitions and procedures."
      signal: "Maturity baseline — identifies priority processes and gaps to address in the documentation corpus"

    - question: "How many of the 14 FitSM processes are currently implemented (even informally), and which ones have documented process definitions?"
      rationale: "FitSM organizations vary widely in formalization. Understanding current coverage helps determine whether this is a greenfield or revision engagement and which processes need the most documentation work."
      signal: "Process coverage — determines engagement mode (greenfield vs. revision) and documentation effort per process"

    - question: "Have your staff received FitSM Foundation or Advanced training, and do you have designated process managers for each in-scope process?"
      rationale: "FitSM role model compliance (FitSM-3) requires process owners and managers. Training gaps affect the level of guidance needed in process definitions and procedures."
      signal: "Role readiness — affects role model design, training recommendations, and procedure detail level"

    - question: "In your federated setup, how are underpinning agreements (UAs) and operational level agreements (OLAs) currently managed between federation members?"
      rationale: "FitSM's agreement hierarchy (SLA > OLA/UA) is central to service level management. Federated environments often have complex multi-party agreements that require careful documentation."
      signal: "Agreement complexity — affects PR02 SLM and PR23 SUPPM documentation depth"

    - question: "Do you maintain a configuration management database (CMDB), and if so, what is its approximate scope and accuracy level?"
      rationale: "FitSM PR11 CONFM requires a CMDB with defined CI types, relationships, and verification. The current state determines whether configuration management documentation needs to cover initial setup or optimization."
      signal: "CMDB maturity — affects PR17 documentation scope and verification procedure requirements"

requirement_prompts:
  prompts:
    - category: "1"
      prompt: "Map each in-scope process to the corresponding FitSM-1 process-specific requirements (PR1.x through PR14.x). Identify which requirements are already met, partially met, or unmet."
      framework_context: "FitSM-1 defines 65 process-specific requirements across 14 processes. Each process definition must demonstrate traceability to these requirements for conformity assessment."

    - category: "2"
      prompt: "For each process, determine whether the process owner and process manager roles will be combined or separate. Document where the SMS owner will also serve as process owner."
      framework_context: "FitSM-3 defines a three-tier role pattern (process owner, process manager, case owner) for each process. In smaller organizations, roles are often combined — this must be explicitly documented."

    - category: "3"
      prompt: "Decide how FitSM's combined ISRM process (PR9) will be documented — as a single combined process or as separate Incident Management and Service Request Management processes."
      framework_context: "FitSM combines incident and service request management into PR9 ISRM. The 3PA model separates them (PR11, PR12). The decision affects process definition structure, RACI matrices, and procedure documents."

    - category: "3"
      prompt: "Decide how FitSM's combined SACM process (PR4) will be documented — as a single combined process or as separate Availability Management and Service Continuity Management processes."
      framework_context: "FitSM combines availability and continuity management into PR4 SACM. The 3PA model separates them (PR06, PR07). The decision affects process definition structure and plan documents."

    - category: "4"
      prompt: "Define the target maturity level for each in-scope process using the FitSM-6 capability level scale (0-5). Set a realistic initial target and a 12-month improvement target."
      framework_context: "FitSM-6 defines a capability assessment scale that can be applied to each process. Setting explicit targets drives documentation depth and improvement planning."

    - category: "6"
      prompt: "Establish the CSI governance model: how will improvement opportunities be registered, evaluated, and prioritized? Define the CSI register format and review cadence."
      framework_context: "FitSM GR7 and PR14 CSI require a systematic approach to continual improvement. The governance model determines how improvements flow from identification through implementation."

    - category: "7"
      prompt: "For each of the seven general requirements (GR1-GR7), identify the specific evidence artifacts that will demonstrate conformity — linking each sub-requirement to a document or record."
      framework_context: "FitSM-1 general requirements apply across the entire SMS and must be evidenced through documentation. The evidence mapping ensures completeness and supports assessment readiness."

    - category: "8"
      prompt: "Define the approach for managing the FitSM documentation hierarchy: service management policy, service management plan, process definitions, procedures, and records. Specify ownership, review cycles, and version control."
      framework_context: "FitSM GR2 requires controlled documentation. The documentation hierarchy must be consistent with FitSM-1 requirements and the organization's documentation management approach."

document_section_templates:
  templates:
    - document_type: "sms-policy"
      sections:
        - heading: "FitSM General Requirements Alignment"
          guidance: "For each general requirement GR1-GR7, state how the organization addresses the requirement. Reference the specific FitSM-1 sub-requirements (GR1.1-GR1.3, GR2.1-GR2.4, etc.) and identify the evidence artifacts that demonstrate conformity."
          tier: "t1"
        - heading: "FitSM Certification Scope"
          guidance: "If pursuing FitSM certification or ISO 20000 readiness, state the certification scope, target timeline, and the subset of FitSM processes in scope. Reference the FitSM-6 assessment tool and planned assessment schedule."
          tier: "t2"
        - heading: "Federation Governance"
          guidance: "If operating in a federated environment, describe the federation structure, the role of the federator, member responsibilities, and how SMS policies apply across federation boundaries."
          tier: "t2"

    - document_type: "process-definition"
      sections:
        - heading: "FitSM Requirements Traceability"
          guidance: "List each FitSM-1 process-specific requirement applicable to this process (e.g., PR1.1-PR1.4 for SPM). For each requirement, describe how this process definition addresses it and reference the specific section, activity, or artifact."
          tier: "t1"
        - heading: "FitSM Role Mapping"
          guidance: "Map the roles defined in this process to the FitSM-3 role model. Identify the process owner, process manager, and any case owner roles. Where roles are combined, document the combination and rationale."
          tier: "t1"

    - document_type: "process-policy"
      sections:
        - heading: "FitSM Alignment Statement"
          guidance: "State how this process policy aligns with FitSM-1 requirements and the overarching service management policy. Reference the specific general requirements (GR1-GR7) that this process supports."
          tier: "t1"

    - document_type: "completeness-report"
      sections:
        - heading: "FitSM Maturity Assessment Summary"
          guidance: "Summarize the current FitSM-6 capability level for each in-scope process. Compare against target levels set during P2. Highlight processes that have not yet reached their target capability level and the specific gaps."
          tier: "t2"
        - heading: "General Requirements Conformity Status"
          guidance: "For each general requirement GR1-GR7, state the conformity status (conforming, partially conforming, nonconforming) with evidence references."
          tier: "t2"

quality_checks:
  checks:
    - gate: "G3"
      check: "FitSM process coverage completeness"
      pass_criteria: "All FitSM processes in scope have corresponding process definitions. For split processes (SACM to PR06/PR07, ISRM to PR11/PR12), both halves are documented."
      tier: "t1"

    - gate: "G4"
      check: "FitSM-1 requirements traceability"
      pass_criteria: "Every FitSM-1 process-specific requirement for in-scope processes is addressed in the corresponding process definition with an explicit traceability statement."
      tier: "t1"

    - gate: "G5"
      check: "FitSM general requirements coverage"
      pass_criteria: "All seven general requirements (GR1-GR7) are addressed in the SMS policy with specific evidence artifacts identified. Sub-requirements GR1.1-GR1.3, GR2.1-GR2.4, GR3.1-GR3.2, GR4.1-GR4.2, GR5.1-GR5.2, GR6.1-GR6.2, GR7.1-GR7.2 are each covered."
      tier: "t1"

    - gate: "G6"
      check: "FitSM-3 role model compliance"
      pass_criteria: "Every in-scope process has process owner and process manager roles assigned. Case owner roles are defined for ticket-based processes. Role descriptions align with FitSM-3 generic patterns."
      tier: "t1"

    - gate: "G8"
      check: "FitSM certification readiness"
      pass_criteria: "Documentation corpus is sufficient to support a FitSM-6 assessment at the target maturity level. All required evidence artifacts for GR1-GR7 and process-specific requirements are present and current."
      tier: "t2"

terminology:
  terms:
    - term: "Service Management System (SMS)"
      definition: "Overall management system that controls and supports management of services within an organization or federation. Comprises the entirety of interconnected policies, processes, procedures, roles, agreements, plans, and related resources."
      aliases: ["management system"]
      context: "Central concept in FitSM. All processes operate within the SMS context."

    - term: "Service Availability and Continuity Management (SACM)"
      definition: "FitSM process (PR4) that combines availability management and continuity management into a single process to ensure services meet agreed availability and continuity targets."
      aliases: ["PR4", "SACM", "availability and continuity management"]
      context: "In the 3PA model, this FitSM process maps to two separate processes: PR06 Availability Management and PR07 Service Continuity Management."

    - term: "Incident and Service Request Management (ISRM)"
      definition: "FitSM process (PR9) that combines incident management and service request management into a single process for restoring service and responding to user requests."
      aliases: ["PR9", "ISRM", "incident and service request management"]
      context: "In the 3PA model, this FitSM process maps to two separate processes: PR11 Incident Management and PR12 Service Request Management."

    - term: "Continual Service Improvement (CSI)"
      definition: "FitSM process (PR14) for planning, implementing, and reviewing improvements to services and processes based on assessments, reports, and management reviews."
      aliases: ["PR14", "CSI", "continual improvement"]
      context: "Maps to 3PA PR24 Continual Improvement. Driven by GR7 general requirement."

    - term: "Service Portfolio"
      definition: "Internal list detailing all services offered by a service provider, including those in preparation, live, and discontinued."
      aliases: ["portfolio"]
      context: "Maintained by the SPM process (PR1). Contains the service pipeline, service catalogue, and retired services."

    - term: "Service Catalogue"
      definition: "Customer-facing list of all live services offered, along with relevant information about those services."
      aliases: ["catalog", "service catalog"]
      context: "A filtered, customer-visible view of the service portfolio. Maintained by the SLM process (PR2) in FitSM."

    - term: "Service Level Agreement (SLA)"
      definition: "Documented agreement between a customer and service provider specifying the service to be provided and the service targets that define how it will be provided."
      aliases: ["SLA"]
      context: "Primary agreement type in FitSM. All services delivered to customers shall have SLAs per PR2."

    - term: "Operational Level Agreement (OLA)"
      definition: "Documented agreement between a service provider and an internal supplier or federation member specifying the underpinning service or service components and related operational targets."
      aliases: ["OLA"]
      context: "Supports customer-facing SLAs with internal operational commitments. Important in federated environments."

    - term: "Underpinning Agreement (UA)"
      definition: "Documented agreement between a service provider and an external supplier specifying the underpinning service or service components and related operational targets."
      aliases: ["UA", "underpinning contract", "UC"]
      context: "External counterpart to OLAs. Required per FitSM PR2 for supporting services from external suppliers."

    - term: "Configuration Management Database (CMDB)"
      definition: "Store for data about configuration items. May be a single database or composed of multiple data stores."
      aliases: ["CMDB", "configuration database"]
      context: "Central data store for FitSM PR11 CONFM. Stores CI records, attributes, and relationships."

    - term: "Configuration Item (CI)"
      definition: "Element that contributes to the delivery of one or more services or service components, requiring control of its configuration."
      aliases: ["CI"]
      context: "Tracked in the CMDB. CIs range from hardware and software to documentation and agreements."

    - term: "Request for Change (RFC)"
      definition: "Documented proposal for a change to a configuration item or other entity requiring change control."
      aliases: ["RFC", "change request"]
      context: "Primary input to the change management process (PR12 CHM in FitSM)."

    - term: "Known Error"
      definition: "Problem which has not yet been resolved, but for which documented workarounds or measures exist to reduce or prevent negative impact on services."
      aliases: ["known error record", "KEDB entry"]
      context: "Managed by the problem management process (PR10 PM in FitSM). Used by incident management to speed resolution."

    - term: "Major Incident"
      definition: "Incident that has or may have significant impact on the customer and requires dedicated handling procedures."
      aliases: ["P1 incident", "critical incident"]
      context: "FitSM PR9.6 requires major incidents to be identified based on defined criteria and handled consistently."

    - term: "Process Owner"
      definition: "Role accountable for the strategic direction, fitness for purpose, and continual improvement of a specific ITSM process."
      aliases: ["process sponsor"]
      context: "FitSM-3 defines process owners for each of the 14 processes. Analogous to the SMS owner at the process level."

    - term: "Process Manager"
      definition: "Role responsible for the day-to-day operational management of a specific ITSM process including staff coordination, monitoring, and reporting."
      aliases: ["process coordinator"]
      context: "FitSM-3 defines process managers for each of the 14 processes. Responsible counterpart to the process owner."

    - term: "Case Owner"
      definition: "Role with overall responsibility for managing a specific case (such as an incident, problem, change, or release) through its lifecycle within a process."
      aliases: ["ticket owner", "case coordinator"]
      context: "FitSM-3 defines case owners for ticket-based processes. One case owner per case instance."

    - term: "Capability Level"
      definition: "Achieved level of effectiveness of an individual process or general aspect of management, as measured by the FitSM-6 assessment scheme."
      aliases: ["process capability", "maturity level (process)"]
      context: "FitSM-6 defines capability levels 0-5 for individual processes. The overall SMS maturity is derived from individual process capabilities."

    - term: "Federation"
      definition: "Situation in which multiple parties (federation members) jointly contribute to the delivery of services to customers without being organized in a strict hierarchical setup or supply chain."
      aliases: ["federated environment", "federated infrastructure"]
      context: "Key FitSM differentiator. Federation affects role assignments, agreement structures, and governance models."

    - term: "Federator"
      definition: "Body that acts to coordinate a set of federation members in a federated service delivery arrangement."
      aliases: ["federation coordinator"]
      context: "In a federation, the federator coordinates but does not hierarchically control federation members."

    - term: "Service Management Plan"
      definition: "Overall plan for implementing and operating a service management system, including goals, timing, roles, training, and technology."
      aliases: ["SMP", "SMS plan"]
      context: "Required by FitSM GR4. All process-specific plans must align to the service management plan."

    - term: "Post Implementation Review (PIR)"
      definition: "Review conducted after the implementation of a change to determine whether the change was successful."
      aliases: ["PIR", "post-change review"]
      context: "Required by FitSM PR12.5 for changes. Depth varies by change type and complexity."

tooling_recommendations:
  tools:
    - name: "FitSM-6 Assessment and Audit Tool"
      purpose: "Structured assessment of SMS maturity and process capability levels against FitSM requirements"
      url: "https://www.fitsm.eu"
      integration: "Use during P1 to establish maturity baseline, during P4 to validate documentation completeness, and during P5 to produce the maturity assessment summary in the completeness report."

    - name: "FitSM Process Definition Template"
      purpose: "Standardized template for documenting process definitions according to FitSM-1 GR2.2 requirements"
      url: "https://www.fitsm.eu"
      integration: "Use as a reference during P3 to ensure process definitions include all FitSM-required sections: goals, inputs, activities, outputs, roles, interfaces, policies, and procedures."

    - name: "FitSM SLA Template"
      purpose: "Sample SLA structure aligned with FitSM PR2 service level management requirements"
      url: "https://www.fitsm.eu"
      integration: "Use during P3 as a starting point for SLA document authoring. Customize service targets, reporting frequency, and review cadence to match organizational needs."

