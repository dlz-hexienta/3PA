# 3PA Framework Pack — ITIL v4
# Comprehensive IT service management framework based on the Service Value System
# Covers all 24 3PA processes (PR01–PR24)

meta:
  name: "ITIL v4"
  version: "0.1"
  framework_id: itil-v4
  description: "Comprehensive IT service management framework based on the Service Value System"
  source_version: "4.0"
  last_updated: "2026-03-15"
  keywords: [itil, itil4, itil-v4, "itil v4", axelos, "service value system", svs]

process_model:
  processes:
    # ── Phase A — Foundation ──────────────────────────────────────────

    - id: PR01
      name: "Service Portfolio Management"
      framework_practice_name: "Portfolio Management"
      purpose: "Ensure the organization maintains the right mix of services to execute its strategy within funding and resource constraints"
      scope: "Service portfolio lifecycle from demand through retirement, including pipeline, catalogue, and retired segments"
      phase: A
      inputs:
        - name: "Service performance data"
          source: "PR02 Service Level Management"
        - name: "Financial data and budgets"
          source: "PR03 Service Financial Management"
        - name: "Customer demand signals"
          source: "PR22 Relationship Management"
        - name: "Improvement initiatives"
          source: "PR24 Continual Improvement"
      outputs:
        - name: "Portfolio decisions and approved services"
          destination: "PR02 Service Level Management"
        - name: "Investment decisions and funding allocations"
          destination: "PR03 Service Financial Management"
        - name: "Design mandates for approved proposals"
          destination: "PR04 Service Design"
        - name: "Catalogue updates for lifecycle transitions"
          destination: "PR05 Service Catalogue Management"
      interfaces:
        - process_id: PR02
          direction: bidirectional
          description: "Service level targets inform portfolio; portfolio decisions set SLA scope"
        - process_id: PR03
          direction: bidirectional
          description: "Financial data informs portfolio; portfolio drives budget allocation"
        - process_id: PR05
          direction: out
          description: "Services transitioning to production or retirement update catalogue"
        - process_id: PR15
          direction: in
          description: "Significant change proposals affect portfolio composition"
        - process_id: PR22
          direction: in
          description: "Customer demand and requirements feed portfolio pipeline"
        - process_id: PR24
          direction: bidirectional
          description: "Improvement proposals may affect portfolio; review findings drive improvement"
      activities:
        - name: "Define portfolio management approach"
          description: "Establish governance model, assessment criteria, service specification templates, and decision thresholds"
        - name: "Establish initial service portfolio"
          description: "Inventory all existing services with key attributes, map delivery parties, identify contacts"
        - name: "Manage demand and service proposals"
          description: "Capture demand signals, create standardized proposals, evaluate against criteria"
        - name: "Maintain the service portfolio"
          description: "Add approved services, update records through lifecycle transitions, manage retirements"
        - name: "Monitor portfolio performance"
          description: "Track value realization, measure against planned criteria, report portfolio health"
        - name: "Conduct periodic portfolio assessments"
          description: "Merge monitoring data with business indicators, assess investment balance, formulate recommendations"
        - name: "Conduct portfolio reviews"
          description: "Hold governance meetings, approve investments, divest underperformers, reprioritize backlog"
        - name: "Align portfolio to enterprise architecture"
          description: "Map services to architecture blueprints and value streams, validate roadmap alignment"
      kpis:
        - name: "Portfolio Completeness"
          formula: "(Services in portfolio register / Total known live services) x 100"
          target: "100%"
        - name: "Proposal Evaluation Rate"
          formula: "(Proposals evaluated within SLA / Total proposals submitted) x 100"
          target: ">= 90%"
        - name: "Portfolio Review Adherence"
          formula: "(Reviews conducted on schedule with quorum / Total scheduled reviews) x 100"
          target: "100%"

    - id: PR03
      name: "Service Financial Management"
      framework_practice_name: "Service Financial Management"
      purpose: "Ensure financial resources and investments are used effectively to support service management strategies and plans"
      scope: "Budgeting, costing, accounting, and charging for products and services throughout their lifecycle"
      phase: A
      inputs:
        - name: "Organizational architectures and portfolios"
          source: "PR01 Service Portfolio Management"
        - name: "Service configuration data"
          source: "PR17 Service Configuration Management"
        - name: "IT asset data"
          source: "PR18 IT Asset Management"
        - name: "Contracts and agreements"
          source: "PR23 Supplier Management"
      outputs:
        - name: "Cost models and budget models"
          destination: "All practices"
        - name: "Compiled and approved budgets"
          destination: "Executive management, product/service owners"
        - name: "Spending decisions and approvals"
          destination: "PR15 Change Management"
        - name: "Service financial reports"
          destination: "PR20 Measurement & Reporting"
      interfaces:
        - process_id: PR01
          direction: bidirectional
          description: "Financial data informs portfolio decisions; portfolio prioritizes funding"
        - process_id: PR02
          direction: bidirectional
          description: "Financial data supports SLA negotiations and cost-benefit analysis"
        - process_id: PR17
          direction: in
          description: "Configuration data enables accurate cost allocation across services"
        - process_id: PR18
          direction: in
          description: "Asset data provides cost information, depreciation, lifecycle costs"
        - process_id: PR15
          direction: out
          description: "Financial assessment feeds change evaluation; budget-affecting changes need approval"
        - process_id: PR24
          direction: out
          description: "Financial analysis identifies cost optimization opportunities"
      activities:
        - name: "Analyse stakeholder requirements"
          description: "Identify stakeholders needing financial information, gather requirements for data scope and detail"
        - name: "Define service financial management approach"
          description: "Agree cost models, budget models, policies, procedures, data structures, roles and responsibilities"
        - name: "Communicate and integrate the approach"
          description: "Communicate approach to stakeholders, implement in conjunction with related practices"
        - name: "Estimate costs and income"
          description: "Based on plans and performance, estimate costs and income for planned initiatives or periods"
        - name: "Compile and agree budgets"
          description: "Aggregate estimates into budgets, submit for approval, communicate for execution"
        - name: "Monitor and control costs and income"
          description: "Monitor budget execution, authorize spending, adjust within tolerances, escalate risks"
        - name: "Perform cost allocation"
          description: "Select cost model, perform categorization and allocation, manage exceptions"
        - name: "Provide financial reports"
          description: "Present financial information as dashboards, operational reports, or analytical reports"
      kpis:
        - name: "Budget Accuracy"
          formula: "(1 - |Actual costs - Budgeted costs| / Budgeted costs) x 100"
          target: ">= 90%"
        - name: "Cost Model Coverage"
          formula: "(Products and services with documented cost models / Total products and services) x 100"
          target: ">= 80%"
        - name: "Financial Reporting Timeliness"
          formula: "(Financial reports delivered on time / Total financial reports due) x 100"
          target: ">= 95%"

    - id: PR09
      name: "Information Security Management"
      framework_practice_name: "Information Security Management"
      purpose: "Protect the information needed to conduct business by managing risks to confidentiality, integrity, and availability"
      scope: "Security governance across IT systems, software, endpoints, IoT, processes, people, partners, and data"
      phase: A
      inputs:
        - name: "Service level requirements with security targets"
          source: "PR02 Service Level Management"
        - name: "Configuration data for security scope"
          source: "PR17 Service Configuration Management"
        - name: "Risk assessments and risk register"
          source: "PR21 Risk Management"
        - name: "Monitoring events and security alerts"
          source: "PR14 Monitoring & Event Management"
      outputs:
        - name: "Information security policy and controls"
          destination: "All practices"
        - name: "Security requirements for SLAs"
          destination: "PR02 Service Level Management"
        - name: "Security incident reports"
          destination: "PR11 Incident Management"
        - name: "Security risk assessments"
          destination: "PR21 Risk Management"
      interfaces:
        - process_id: PR02
          direction: bidirectional
          description: "Security requirements feed SLAs; SLA security targets drive controls"
        - process_id: PR11
          direction: bidirectional
          description: "Security incidents trigger incident management; incident data informs security"
        - process_id: PR15
          direction: out
          description: "Security assessment feeds change evaluation for security impact"
        - process_id: PR17
          direction: in
          description: "CI data enables security scope identification and impact analysis"
        - process_id: PR21
          direction: bidirectional
          description: "Security risks feed risk register; risk appetite governs security controls"
      activities:
        - name: "Develop and maintain information security policy"
          description: "Define security objectives, principles, and governance aligned with business needs"
        - name: "Conduct security risk assessments"
          description: "Identify threats and vulnerabilities, assess likelihood and impact, determine risk treatment"
        - name: "Implement and manage security controls"
          description: "Deploy preventive, detective, and corrective controls across all dimensions"
        - name: "Manage security incidents"
          description: "Detect, respond to, and recover from security events and breaches"
        - name: "Conduct security awareness training"
          description: "Educate staff on security policies, threats, and behaviours"
        - name: "Monitor security posture"
          description: "Continuously monitor for threats, vulnerabilities, and compliance gaps"
        - name: "Perform security audits and compliance checks"
          description: "Verify controls effectiveness, assess regulatory compliance, report findings"
        - name: "Review and improve security approach"
          description: "Evaluate security effectiveness, adapt to emerging threats, update policies and controls"
      kpis:
        - name: "Security Policy Coverage"
          formula: "(Services with documented security controls / Total services) x 100"
          target: "100%"
        - name: "Security Incident Rate"
          formula: "Count of security incidents per reporting period"
          target: "Trending downward"
        - name: "Security Awareness Compliance"
          formula: "(Staff completing security training / Total staff) x 100"
          target: ">= 95%"

    - id: PR17
      name: "Service Configuration Management"
      framework_practice_name: "Service Configuration Management"
      purpose: "Ensure accurate, reliable information about service configurations and supporting CIs is available when needed"
      scope: "Configuration items across all four dimensions — technology, suppliers, people, and processes"
      phase: A
      inputs:
        - name: "Change records and implementation details"
          source: "PR15 Change Management"
        - name: "Release and deployment records"
          source: "PR16 Release & Deployment Management"
        - name: "IT asset register data"
          source: "PR18 IT Asset Management"
        - name: "Service design packages"
          source: "PR04 Service Design"
      outputs:
        - name: "Configuration models and CI data"
          destination: "All practices"
        - name: "Impact analysis for change assessment"
          destination: "PR15 Change Management"
        - name: "Service dependency maps"
          destination: "PR06 Availability Management"
        - name: "CI-to-service mapping for cost allocation"
          destination: "PR03 Service Financial Management"
      interfaces:
        - process_id: PR11
          direction: out
          description: "CI data supports incident diagnosis and impact assessment"
        - process_id: PR13
          direction: out
          description: "Configuration models support root cause analysis"
        - process_id: PR15
          direction: bidirectional
          description: "CI data informs change impact; changes trigger CMDB updates"
        - process_id: PR18
          direction: bidirectional
          description: "Asset register and CMDB are complementary; data shared between them"
        - process_id: PR05
          direction: out
          description: "Service models and CI relationships enrich catalogue views"
      activities:
        - name: "Define configuration management approach"
          description: "Establish CI scope, naming conventions, attribute standards, and governance model"
        - name: "Identify and register configuration items"
          description: "Determine which components are CIs, define attributes, record in CMDB"
        - name: "Maintain CI records and relationships"
          description: "Update CI attributes and relationships as changes occur across the lifecycle"
        - name: "Produce configuration models"
          description: "Create service models showing CI relationships for impact and root cause analysis"
        - name: "Verify configuration data accuracy"
          description: "Conduct audits comparing CMDB records against actual infrastructure state"
        - name: "Provide configuration information to stakeholders"
          description: "Deliver CI data, service models, and impact analysis to consuming processes"
      kpis:
        - name: "CMDB Accuracy"
          formula: "(CIs verified as accurate / Total CIs audited) x 100"
          target: ">= 95%"
        - name: "CI Coverage"
          formula: "(CIs recorded in CMDB / Total in-scope components) x 100"
          target: "100%"
        - name: "Configuration Audit Compliance"
          formula: "(Audits completed on schedule / Total scheduled audits) x 100"
          target: "100%"

    # ── Phase B — Agreements ──────────────────────────────────────────

    - id: PR02
      name: "Service Level Management"
      framework_practice_name: "Service Level Management"
      purpose: "Establish clear, business-relevant service quality targets, agree them with customers, and monitor fulfilment"
      scope: "Service catalogues, SLA/OLA/UA lifecycle, service quality monitoring, service reviews, and reporting"
      phase: B
      inputs:
        - name: "Service portfolio and specifications"
          source: "PR01 Service Portfolio Management"
        - name: "Availability data and targets"
          source: "PR06 Availability Management"
        - name: "Monitoring data"
          source: "PR14 Monitoring & Event Management"
        - name: "Customer requirements and feedback"
          source: "PR22 Relationship Management"
      outputs:
        - name: "SLA targets and evaluation data"
          destination: "PR20 Measurement & Reporting"
        - name: "Availability targets from SLAs"
          destination: "PR06 Availability Management"
        - name: "Service catalogue and SLAs"
          destination: "PR22 Relationship Management"
        - name: "Improvement opportunities"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: PR01
          direction: bidirectional
          description: "Portfolio provides service specs; SLM returns performance data"
        - process_id: PR06
          direction: bidirectional
          description: "Availability data informs SLAs; SLA targets drive availability planning"
        - process_id: PR08
          direction: bidirectional
          description: "Performance data informs SLAs; SLA targets drive capacity planning"
        - process_id: PR11
          direction: in
          description: "Incident records provide volumes, resolution times for SLA evaluation"
        - process_id: PR22
          direction: bidirectional
          description: "Customer requirements drive SLAs; SLAs support customer communication"
        - process_id: PR23
          direction: bidirectional
          description: "Supplier capabilities inform UAs; performance reports feed supplier evaluation"
      activities:
        - name: "Define SLM approach and templates"
          description: "Create SLA, OLA, UA templates; establish default SLA; define violation notification methods"
        - name: "Establish the service catalogue"
          description: "Create catalogue from portfolio, populate entries, identify supporting components"
        - name: "Define and negotiate service level agreements"
          description: "Gather requirements, assess viability, draft and negotiate SLAs with customers"
        - name: "Evaluate agreement fulfilment"
          description: "Collect performance data, compare against targets, identify breaches and near-misses"
        - name: "Manage supporting agreements"
          description: "Define and negotiate OLAs and UAs, evaluate fulfilment, review and update"
        - name: "Conduct service reviews"
          description: "Periodic and event-based reviews covering achieved levels, satisfaction, and improvements"
        - name: "Monitor service quality continuously"
          description: "Collect ongoing data from monitoring, user feedback, and satisfaction surveys"
        - name: "Produce service quality reports"
          description: "Generate reports demonstrating achieved levels, satisfaction scores, and improvement progress"
      kpis:
        - name: "SLA Compliance Rate"
          formula: "(SLA targets met / Total SLA targets evaluated) x 100"
          target: ">= 95%"
        - name: "SLA Coverage"
          formula: "(Services with active SLA / Total customer-facing services) x 100"
          target: "100%"
        - name: "Customer Satisfaction Score"
          formula: "Average of customer satisfaction survey scores (scale 1-5)"
          target: ">= 3.5 / 5"

    - id: PR04
      name: "Service Design"
      framework_practice_name: "Service Design"
      purpose: "Design products and services that are fit for purpose and fit for use, deliverable by the organization and its ecosystem"
      scope: "Holistic design across all four dimensions, service design packages, design thinking, risk modelling"
      phase: B
      inputs:
        - name: "Organization strategy and portfolio"
          source: "PR01 Service Portfolio Management"
        - name: "Architectural patterns and principles"
          source: "Architecture Management"
        - name: "Customer and user feedback"
          source: "PR22 Relationship Management"
        - name: "Security, continuity, and capacity policies"
          source: "PR09, PR07, PR08"
      outputs:
        - name: "Service design packages and templates"
          destination: "PR15 Change Management, PR16 Release Management"
        - name: "Service design review reports"
          destination: "PR24 Continual Improvement"
        - name: "Updated knowledge articles"
          destination: "PR19 Knowledge Management"
        - name: "Service portfolio updates"
          destination: "PR01 Service Portfolio Management"
      interfaces:
        - process_id: PR01
          direction: bidirectional
          description: "Portfolio decisions drive design demand; design outcomes update portfolio"
        - process_id: PR02
          direction: in
          description: "SLAs define service requirements that must be designed for"
        - process_id: PR09
          direction: in
          description: "Security controls and compliance needs are design inputs"
        - process_id: PR15
          direction: out
          description: "Design outputs feed change evaluation"
        - process_id: PR16
          direction: out
          description: "Design packages support release planning"
        - process_id: PR22
          direction: in
          description: "Customer and user feedback informs design requirements"
      activities:
        - name: "Analyse service environment and requirements"
          description: "Assess conditions affecting design including architecture, feedback, risk, and compliance"
        - name: "Review and develop service design approach"
          description: "Agree design philosophy, methods, techniques, and integration points"
        - name: "Review and develop service design models"
          description: "Define procedures, controls, SDP templates, schedule and communications templates"
        - name: "Plan service design instances"
          description: "Plan requirements tracking, communications, partner interactions, and resources"
        - name: "Orchestrate and coordinate design execution"
          description: "Manage teams, requirements tracking, communications, and holistic design view"
        - name: "Review service design outcomes"
          description: "Assess compliance with standards, verify SDP completeness, log lessons learned"
        - name: "Model and manage service risk tiers"
          description: "Develop risk questionnaires, profile services, assign risk-aligned tiers and SDPs"
        - name: "Optimize the service design practice"
          description: "Evaluate adherence, assess fitness for purpose, measure stakeholder satisfaction"
      kpis:
        - name: "SDP Completeness"
          formula: "(Services with complete SDPs / Total new or changed services) x 100"
          target: ">= 90%"
        - name: "Fitness for Purpose Rate"
          formula: "(Products meeting utility requirements / Total assessed) x 100"
          target: ">= 95%"
        - name: "Design-Attributable Defect Rate"
          formula: "Count of design-attributable defects per period by severity"
          target: "Trending downward; zero critical"

    - id: PR05
      name: "Service Catalogue Management"
      framework_practice_name: "Service Catalogue Management"
      purpose: "Provide a single source of consistent information on all services and service offerings for relevant audiences"
      scope: "Catalogue data structure, views for users/customers/providers, data integration, quality assurance"
      phase: B
      inputs:
        - name: "Service portfolio"
          source: "PR01 Service Portfolio Management"
        - name: "Service configuration data"
          source: "PR17 Service Configuration Management"
        - name: "Contracts and agreements"
          source: "PR02 Service Level Management"
        - name: "Financial data"
          source: "PR03 Service Financial Management"
      outputs:
        - name: "Published service catalogue data"
          destination: "Users, customers, internal teams"
        - name: "Request catalogue for service requests"
          destination: "PR12 Service Request Management"
        - name: "Data integration requirements"
          destination: "Technical teams, suppliers"
        - name: "Catalogue feedback data"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: PR01
          direction: in
          description: "Portfolio lifecycle decisions trigger catalogue updates"
        - process_id: PR02
          direction: bidirectional
          description: "SLA information enriches views; catalogue is basis for SLA negotiation"
        - process_id: PR10
          direction: out
          description: "Catalogue is primary tool for service desk; errors are treated as incidents"
        - process_id: PR12
          direction: out
          description: "Request catalogue enables users to identify and submit requests"
        - process_id: PR17
          direction: in
          description: "CI data and service models enrich catalogue views"
      activities:
        - name: "Analyse stakeholder requirements for the catalogue"
          description: "Identify stakeholder groups, discover requirements for scope, granularity, and access"
        - name: "Define catalogue data structure"
          description: "Define core service data, view-specific data, technical approach, automation needs"
        - name: "Define standard catalogue views"
          description: "Create user, customer, and provider views from single data repository"
        - name: "Collect and maintain catalogue data"
          description: "Enter data, establish update procedures, work with external data owners"
        - name: "Monitor and maintain data quality"
          description: "Ensure correctness, completeness, currency; treat catalogue errors as incidents"
        - name: "Gather and process user feedback"
          description: "Collect feedback on scheduled basis, monitor user experience patterns"
      kpis:
        - name: "Catalogue Completeness"
          formula: "(Services in catalogue / Total services managed) x 100"
          target: "100%"
        - name: "Core Data Completeness"
          formula: "(Entries with all core attributes / Total entries) x 100"
          target: "100%"
        - name: "Stakeholder Satisfaction with Catalogue"
          formula: "Average satisfaction score by stakeholder group (scale 1-5)"
          target: ">= 4.0 / 5"

    - id: PR22
      name: "Relationship Management"
      framework_practice_name: "Relationship Management"
      purpose: "Establish and nurture effective links between the organization and its stakeholders at all levels"
      scope: "Stakeholder identification, relationship monitoring, satisfaction measurement, complaint handling, conflict prevention"
      phase: B
      inputs:
        - name: "Service performance data"
          source: "PR02 Service Level Management"
        - name: "Incident and request feedback"
          source: "PR10 Service Desk"
        - name: "Portfolio roadmap"
          source: "PR01 Service Portfolio Management"
      outputs:
        - name: "Customer demand and requirements"
          destination: "PR01 Service Portfolio Management"
        - name: "Customer service level requirements"
          destination: "PR02 Service Level Management"
        - name: "Satisfaction survey results"
          destination: "PR20 Measurement & Reporting"
        - name: "Complaint records and escalations"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: PR01
          direction: bidirectional
          description: "Demand signals feed portfolio; portfolio roadmap communicated to customers"
        - process_id: PR02
          direction: bidirectional
          description: "Customer requirements drive SLAs; SLA performance supports relationship"
        - process_id: PR10
          direction: in
          description: "User feedback and sentiment from service desk contacts"
        - process_id: PR23
          direction: bidirectional
          description: "Supplier relationships complement customer relationships"
        - process_id: PR24
          direction: out
          description: "Relationship insights feed improvement register"
      activities:
        - name: "Develop relationship management approach"
          description: "Define organization-wide approach to relationships and integrate into culture"
        - name: "Identify and analyse stakeholders"
          description: "Map stakeholder interests, influence, and engagement needs"
        - name: "Establish and maintain customer relationships"
          description: "Build trust through regular engagement, transparent communication, and responsiveness"
        - name: "Monitor stakeholder satisfaction"
          description: "Conduct satisfaction surveys, gather feedback, analyse trends"
        - name: "Handle complaints and conflicts"
          description: "Receive complaints, investigate root causes, resolve issues, prevent recurrence"
        - name: "Conduct relationship reviews"
          description: "Periodic assessment of relationship health, identification of improvement areas"
      kpis:
        - name: "Stakeholder Satisfaction Index"
          formula: "Average satisfaction score across stakeholder groups (scale 1-5)"
          target: ">= 4.0 / 5"
        - name: "Complaint Resolution Rate"
          formula: "(Complaints resolved within SLA / Total complaints) x 100"
          target: ">= 90%"
        - name: "Relationship Review Adherence"
          formula: "(Reviews conducted on schedule / Total scheduled reviews) x 100"
          target: "100%"

    - id: PR23
      name: "Supplier Management"
      framework_practice_name: "Supplier Management"
      purpose: "Ensure suppliers and their performance are managed to support seamless provision of quality products and services"
      scope: "Sourcing strategy, supplier evaluation and selection, contract lifecycle, performance management"
      phase: B
      inputs:
        - name: "Service requirements and SLA targets"
          source: "PR02 Service Level Management"
        - name: "Portfolio investment decisions"
          source: "PR01 Service Portfolio Management"
        - name: "Security requirements for suppliers"
          source: "PR09 Information Security Management"
      outputs:
        - name: "Supplier capabilities and contract terms"
          destination: "PR02 Service Level Management"
        - name: "Supplier performance reports"
          destination: "PR20 Measurement & Reporting"
        - name: "Supplier cost data"
          destination: "PR03 Service Financial Management"
        - name: "Supplier service components"
          destination: "PR17 Service Configuration Management"
      interfaces:
        - process_id: PR02
          direction: bidirectional
          description: "SLA requirements drive supplier targets; supplier capabilities inform UAs"
        - process_id: PR03
          direction: out
          description: "Supplier contracts and pricing affect service costs"
        - process_id: PR09
          direction: in
          description: "Security requirements apply to supplier engagements"
        - process_id: PR15
          direction: bidirectional
          description: "Supplier changes may require change management; changes may affect suppliers"
        - process_id: PR22
          direction: bidirectional
          description: "Supplier relationships complement customer relationship management"
      activities:
        - name: "Define sourcing strategy"
          description: "Establish approach to make-vs-buy decisions, supplier categorization, and market analysis"
        - name: "Evaluate and select suppliers"
          description: "Assess supplier capabilities against requirements, conduct due diligence, select providers"
        - name: "Negotiate and agree contracts"
          description: "Define terms, negotiate agreements, establish SLAs and performance targets"
        - name: "Onboard suppliers"
          description: "Integrate suppliers into operational processes, establish communication channels"
        - name: "Monitor supplier performance"
          description: "Track delivery against targets, conduct reviews, manage reward and penalty mechanisms"
        - name: "Manage contract lifecycle"
          description: "Handle amendments, renewals, and terminations; maintain contract register"
        - name: "Manage supplier relationships"
          description: "Build collaborative partnerships with strategic suppliers, resolve conflicts"
        - name: "Offboard suppliers"
          description: "Manage orderly transition when contracts end, ensure knowledge transfer"
      kpis:
        - name: "Supplier Performance Compliance"
          formula: "(Supplier targets met / Total supplier targets evaluated) x 100"
          target: ">= 95%"
        - name: "Contract Coverage"
          formula: "(Suppliers with active contracts / Total active suppliers) x 100"
          target: "100%"
        - name: "Supplier Review Adherence"
          formula: "(Reviews conducted on schedule / Total scheduled reviews) x 100"
          target: "100%"

    # ── Phase C — Operations ──────────────────────────────────────────

    - id: PR10
      name: "Service Desk"
      framework_practice_name: "Service Desk"
      purpose: "Capture demand for incident resolution and service requests, acting as single point of contact for users"
      scope: "Communication channels, user contact handling, logging, tracking, omnichannel integration"
      phase: C
      inputs:
        - name: "Service catalogue and request catalogue"
          source: "PR05 Service Catalogue Management"
        - name: "Known errors and workarounds"
          source: "PR13 Problem Management"
        - name: "Knowledge articles"
          source: "PR19 Knowledge Management"
      outputs:
        - name: "Logged incidents"
          destination: "PR11 Incident Management"
        - name: "Logged service requests"
          destination: "PR12 Service Request Management"
        - name: "User feedback and sentiment"
          destination: "PR22 Relationship Management"
        - name: "User-reported issues and ideas"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: PR11
          direction: out
          description: "Service desk logs and routes incidents to incident management"
        - process_id: PR12
          direction: out
          description: "Service desk logs and routes service requests"
        - process_id: PR05
          direction: in
          description: "Catalogue provides service information for user interactions"
        - process_id: PR13
          direction: in
          description: "Known errors and workarounds enable faster first-line resolution"
        - process_id: PR19
          direction: bidirectional
          description: "Knowledge base supports resolution; desk contributes new articles"
      activities:
        - name: "Establish communication channels"
          description: "Define and implement channels meeting accessibility, availability, and usability requirements"
        - name: "Enable omnichannel communications"
          description: "Integrate channels for seamless user experience across phone, chat, email, portal"
        - name: "Log and track user contacts"
          description: "Register all contacts, categorize, and route to appropriate processes"
        - name: "Provide first-line resolution"
          description: "Resolve incidents and fulfil requests using knowledge base and incident models"
        - name: "Manage user communication throughout"
          description: "Keep users informed of progress, manage expectations, provide empathetic service"
        - name: "Monitor and improve channel effectiveness"
          description: "Analyse channel usage patterns, satisfaction, and resolution rates to optimize"
      kpis:
        - name: "First Contact Resolution Rate"
          formula: "(Contacts resolved at first contact / Total contacts) x 100"
          target: ">= 70%"
        - name: "User Satisfaction Score"
          formula: "Average post-contact satisfaction rating (scale 1-5)"
          target: ">= 4.0 / 5"
        - name: "Channel Availability"
          formula: "(Actual channel availability hours / Agreed availability hours) x 100"
          target: ">= 99%"

    - id: PR11
      name: "Incident Management"
      framework_practice_name: "Incident Management"
      purpose: "Minimize negative impact of incidents by restoring normal service operation as quickly as possible"
      scope: "Incident detection, registration, classification, prioritization, investigation, resolution, and closure"
      phase: C
      inputs:
        - name: "User-reported incidents"
          source: "PR10 Service Desk"
        - name: "Monitoring events and alerts"
          source: "PR14 Monitoring & Event Management"
        - name: "Known errors and workarounds"
          source: "PR13 Problem Management"
        - name: "CI and service dependency data"
          source: "PR17 Service Configuration Management"
      outputs:
        - name: "Incident records and resolution data"
          destination: "PR13 Problem Management"
        - name: "SLA performance data"
          destination: "PR02 Service Level Management"
        - name: "Emergency change requests"
          destination: "PR15 Change Management"
        - name: "Post-incident review findings"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: PR10
          direction: in
          description: "Service desk logs and routes incidents"
        - process_id: PR13
          direction: bidirectional
          description: "Incident data feeds problem identification; known errors accelerate resolution"
        - process_id: PR14
          direction: in
          description: "Events trigger automated incident creation"
        - process_id: PR15
          direction: out
          description: "Emergency changes may be needed to restore service"
        - process_id: PR17
          direction: in
          description: "CI data supports impact assessment and diagnosis"
      activities:
        - name: "Detect and register incidents"
          description: "Identify incidents from user reports, monitoring, or staff observation; create records"
        - name: "Classify and prioritize"
          description: "Categorize by type, assign priority based on impact and urgency matrix"
        - name: "Investigate and diagnose"
          description: "Identify root cause or apply known workarounds from KEDB"
        - name: "Resolve and recover"
          description: "Apply resolution, verify service restoration, confirm with affected users"
        - name: "Close incidents"
          description: "Verify resolution, update records, collect user satisfaction feedback"
        - name: "Manage major incidents"
          description: "Invoke dedicated procedure with coordinator, elevated priority, and stakeholder communication"
        - name: "Conduct post-incident reviews"
          description: "Analyse major incidents for lessons learned and improvement opportunities"
        - name: "Maintain incident models"
          description: "Create and update pre-defined resolution paths for known incident types"
      kpis:
        - name: "Mean Time to Restore Service"
          formula: "Average elapsed time from incident detection to service restoration"
          target: "Within SLA targets by priority"
        - name: "Incident Resolution within SLA"
          formula: "(Incidents resolved within SLA / Total incidents) x 100"
          target: ">= 90%"
        - name: "Major Incident Review Completion"
          formula: "(Major incidents with completed PIR / Total major incidents) x 100"
          target: "100%"

    - id: PR12
      name: "Service Request Management"
      framework_practice_name: "Service Request Management"
      purpose: "Handle all predefined, user-initiated service requests in an effective and user-friendly manner"
      scope: "Request model management, request processing and fulfilment, performance review and improvement"
      phase: C
      inputs:
        - name: "Service requests from users"
          source: "PR10 Service Desk"
        - name: "Request catalogue"
          source: "PR05 Service Catalogue Management"
        - name: "Request fulfilment models"
          source: "PR04 Service Design"
      outputs:
        - name: "Fulfilled service requests"
          destination: "Users"
        - name: "Request fulfilment data"
          destination: "PR02 Service Level Management"
        - name: "Improvement opportunities"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: PR10
          direction: in
          description: "Service desk logs and routes service requests"
        - process_id: PR05
          direction: in
          description: "Request catalogue defines available requests and fulfilment information"
        - process_id: PR15
          direction: bidirectional
          description: "Some requests may trigger standard changes; request models are pre-authorized"
        - process_id: PR09
          direction: in
          description: "Access requests require security validation"
      activities:
        - name: "Manage service request models"
          description: "Create, test, deploy, and maintain fulfilment procedures for each request type"
        - name: "Receive and validate requests"
          description: "Accept requests, validate entitlement and completeness, apply request model"
        - name: "Manage approvals"
          description: "Route requests through approval workflows as defined in the model"
        - name: "Coordinate fulfilment"
          description: "Execute fulfilment steps, coordinate multi-team activities, track progress"
        - name: "Verify and close requests"
          description: "Confirm fulfilment with requestor, collect feedback, close record"
        - name: "Review and improve fulfilment performance"
          description: "Analyse fulfilment metrics, identify bottlenecks, optimize models"
      kpis:
        - name: "Request Fulfilment within SLA"
          formula: "(Requests fulfilled within agreed timeframe / Total requests) x 100"
          target: ">= 95%"
        - name: "Request Fulfilment Satisfaction"
          formula: "Average post-fulfilment satisfaction rating (scale 1-5)"
          target: ">= 4.0 / 5"
        - name: "Request Model Coverage"
          formula: "(Request types with documented models / Total request types) x 100"
          target: ">= 90%"

    - id: PR13
      name: "Problem Management"
      framework_practice_name: "Problem Management"
      purpose: "Reduce likelihood and impact of incidents by identifying actual and potential causes and managing workarounds"
      scope: "Reactive and proactive problem identification, root cause analysis, known error management, KEDB"
      phase: C
      inputs:
        - name: "Incident records and trend data"
          source: "PR11 Incident Management"
        - name: "Monitoring event patterns"
          source: "PR14 Monitoring & Event Management"
        - name: "Configuration and dependency data"
          source: "PR17 Service Configuration Management"
      outputs:
        - name: "Known errors and workarounds"
          destination: "PR11 Incident Management"
        - name: "Change requests for permanent fixes"
          destination: "PR15 Change Management"
        - name: "Root cause analysis reports"
          destination: "PR24 Continual Improvement"
        - name: "Knowledge articles"
          destination: "PR19 Knowledge Management"
      interfaces:
        - process_id: PR11
          direction: bidirectional
          description: "Incident data triggers problem identification; known errors accelerate incident resolution"
        - process_id: PR14
          direction: in
          description: "Event patterns and trends support proactive problem identification"
        - process_id: PR15
          direction: out
          description: "Permanent resolutions require changes through change management"
        - process_id: PR17
          direction: in
          description: "CI relationships support root cause analysis"
        - process_id: PR19
          direction: out
          description: "Known errors and workarounds published as knowledge articles"
      activities:
        - name: "Identify problems reactively"
          description: "Analyse incident data to identify recurring incidents, trends, and patterns"
        - name: "Identify problems proactively"
          description: "Analyse monitoring data, capacity trends, and supplier intelligence for potential causes"
        - name: "Register and classify problems"
          description: "Create problem records, categorize, assess impact, assign priority"
        - name: "Investigate and diagnose root causes"
          description: "Apply structured analysis techniques to determine underlying cause"
        - name: "Develop and document workarounds"
          description: "Create tested workarounds, document in KEDB with application instructions"
        - name: "Manage known errors"
          description: "Maintain KEDB, track known error lifecycle, decide on permanent resolution"
        - name: "Initiate permanent resolutions"
          description: "Raise RFCs for permanent fixes, track through change management"
        - name: "Conduct problem reviews"
          description: "Review problem resolution effectiveness, update processes, share lessons"
      kpis:
        - name: "Known Error Documentation Rate"
          formula: "(Problems with documented known errors / Total diagnosed problems) x 100"
          target: ">= 80%"
        - name: "Problem Resolution Rate"
          formula: "(Problems permanently resolved / Total problems identified) x 100"
          target: "Trending upward"
        - name: "Incident Recurrence Reduction"
          formula: "Reduction in recurring incidents attributable to solved problems"
          target: "Trending downward"

    - id: PR14
      name: "Monitoring & Event Management"
      framework_practice_name: "Monitoring and Event Management"
      purpose: "Systematically observe services and components, detect events, and initiate appropriate responses"
      scope: "Monitoring scope definition, active and passive monitoring, event categorization, response automation"
      phase: C
      inputs:
        - name: "Service level targets and thresholds"
          source: "PR02 Service Level Management"
        - name: "Security monitoring requirements"
          source: "PR09 Information Security Management"
        - name: "CI and service dependency data"
          source: "PR17 Service Configuration Management"
      outputs:
        - name: "Detected events and alerts"
          destination: "PR11 Incident Management"
        - name: "Performance and availability data"
          destination: "PR06 Availability Management, PR08 Capacity & Performance Management"
        - name: "Event trends and patterns"
          destination: "PR13 Problem Management"
        - name: "Monitoring reports"
          destination: "PR20 Measurement & Reporting"
      interfaces:
        - process_id: PR02
          direction: in
          description: "SLA targets define monitoring thresholds"
        - process_id: PR06
          direction: out
          description: "Availability monitoring data feeds availability management"
        - process_id: PR08
          direction: out
          description: "Performance monitoring data feeds capacity management"
        - process_id: PR09
          direction: bidirectional
          description: "Security events trigger security incident handling; security defines monitoring scope"
        - process_id: PR11
          direction: out
          description: "Events trigger automated incident creation"
        - process_id: PR13
          direction: out
          description: "Event patterns support proactive problem identification"
      activities:
        - name: "Define monitoring scope and strategy"
          description: "Determine what to monitor, at what depth, using which techniques"
        - name: "Implement monitoring instrumentation"
          description: "Deploy active and passive monitoring across infrastructure, applications, services"
        - name: "Establish event rules and thresholds"
          description: "Define event classification, correlation rules, and automated responses"
        - name: "Process events"
          description: "Detect, categorize, correlate, and respond to events according to rules"
        - name: "Provide monitoring data to stakeholders"
          description: "Deliver current and historical state information in agreed formats"
        - name: "Optimize monitoring scope and effectiveness"
          description: "Review event rules, tune thresholds, reduce noise, improve detection accuracy"
      kpis:
        - name: "Monitoring Coverage"
          formula: "(Monitored CIs / Total in-scope CIs) x 100"
          target: ">= 95%"
        - name: "Event Processing Timeliness"
          formula: "(Events processed within target time / Total events) x 100"
          target: ">= 99%"
        - name: "False Positive Rate"
          formula: "(False positive events / Total events) x 100"
          target: "< 5%"

    - id: PR15
      name: "Change Management"
      framework_practice_name: "Change Enablement"
      purpose: "Maximize successful service and product changes by ensuring risks are assessed and changes are authorized"
      scope: "Change lifecycle from registration through assessment, authorization, realization control, review, and closure"
      phase: C
      inputs:
        - name: "Requests for change"
          source: "All practices"
        - name: "CI impact analysis"
          source: "PR17 Service Configuration Management"
        - name: "Risk assessments"
          source: "PR21 Risk Management"
        - name: "Release schedules"
          source: "PR16 Release & Deployment Management"
      outputs:
        - name: "Authorized changes"
          destination: "PR16 Release & Deployment Management"
        - name: "Change schedule"
          destination: "All practices"
        - name: "CMDB update triggers"
          destination: "PR17 Service Configuration Management"
        - name: "Change review findings"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: PR11
          direction: in
          description: "Emergency changes may be needed to restore service after incidents"
        - process_id: PR13
          direction: in
          description: "Problem resolutions require changes for permanent fixes"
        - process_id: PR16
          direction: bidirectional
          description: "Authorized changes are bundled into releases; release outcomes feed change review"
        - process_id: PR17
          direction: bidirectional
          description: "CI data informs impact assessment; implemented changes trigger CMDB updates"
        - process_id: PR21
          direction: in
          description: "Risk assessment informs change authorization decisions"
      activities:
        - name: "Register and classify changes"
          description: "Accept RFCs, classify as standard, normal, or emergency; assign change model"
        - name: "Assess change risk and impact"
          description: "Evaluate risk, impact, resource needs, and scheduling using CI data and risk models"
        - name: "Authorize changes"
          description: "Route to appropriate change authority based on risk level and change model"
        - name: "Plan and schedule changes"
          description: "Coordinate implementation timing, manage change calendar, avoid conflicts"
        - name: "Control change realization"
          description: "Monitor implementation progress, manage exceptions, ensure rollback readiness"
        - name: "Review and close changes"
          description: "Verify outcomes, conduct post-implementation review, update records"
        - name: "Manage standard changes"
          description: "Identify candidates, document procedures, pre-authorize, monitor compliance"
        - name: "Manage emergency changes"
          description: "Apply expedited assessment and authorization, ensure retrospective review"
      kpis:
        - name: "Change Success Rate"
          formula: "(Successful changes / Total changes implemented) x 100"
          target: ">= 95%"
        - name: "Emergency Change Ratio"
          formula: "(Emergency changes / Total changes) x 100"
          target: "< 10%"
        - name: "Change Lead Time"
          formula: "Average elapsed time from RFC to implementation by change type"
          target: "Within agreed targets per type"

    - id: PR16
      name: "Release & Deployment Management"
      framework_practice_name: "Release Management"
      purpose: "Make new and changed services available by moving them to target environments and enabling user access"
      scope: "Release planning, build, test, deployment, verification, and review across all environment stages"
      phase: C
      inputs:
        - name: "Authorized changes"
          source: "PR15 Change Management"
        - name: "Service design packages"
          source: "PR04 Service Design"
        - name: "Configuration baselines"
          source: "PR17 Service Configuration Management"
      outputs:
        - name: "Deployed releases in production"
          destination: "Operations"
        - name: "Release records and deployment results"
          destination: "PR17 Service Configuration Management"
        - name: "Release review findings"
          destination: "PR24 Continual Improvement"
        - name: "Updated service catalogue entries"
          destination: "PR05 Service Catalogue Management"
      interfaces:
        - process_id: PR04
          direction: in
          description: "Design packages define what needs to be released"
        - process_id: PR15
          direction: bidirectional
          description: "Authorized changes are bundled into releases; release outcomes feed change review"
        - process_id: PR17
          direction: bidirectional
          description: "Configuration baselines inform release planning; deployments trigger CMDB updates"
        - process_id: PR05
          direction: out
          description: "Deployed services update catalogue entries"
      activities:
        - name: "Define release and deployment approach"
          description: "Establish release types, models, strategies, and procedures"
        - name: "Plan releases"
          description: "Bundle approved changes, plan build, test, and deployment activities"
        - name: "Build and test releases"
          description: "Construct release package, conduct testing in staging environments"
        - name: "Deploy to target environments"
          description: "Move release components to production, manage deployment execution"
        - name: "Enable release for users"
          description: "Make deployed components available, communicate changes, provide support"
        - name: "Verify release outcomes"
          description: "Confirm deployment success, verify acceptance criteria, monitor early life"
        - name: "Review and close releases"
          description: "Document lessons learned, update records, close release record"
      kpis:
        - name: "Release Success Rate"
          formula: "(Releases meeting acceptance criteria / Total releases) x 100"
          target: ">= 95%"
        - name: "Deployment Failure Rate"
          formula: "(Failed deployments requiring rollback / Total deployments) x 100"
          target: "< 5%"
        - name: "Release Lead Time"
          formula: "Average elapsed time from release planning to production deployment"
          target: "Trending downward"

    # ── Phase D — Assurance ───────────────────────────────────────────

    - id: PR06
      name: "Availability Management"
      framework_practice_name: "Availability Management"
      purpose: "Ensure services deliver agreed levels of availability to meet customer and user needs"
      scope: "Availability requirements, monitoring, reporting, risk identification, and control design"
      phase: D
      inputs:
        - name: "SLA availability targets"
          source: "PR02 Service Level Management"
        - name: "Monitoring and availability data"
          source: "PR14 Monitoring & Event Management"
        - name: "CI dependency maps"
          source: "PR17 Service Configuration Management"
        - name: "Incident data on service outages"
          source: "PR11 Incident Management"
      outputs:
        - name: "Availability data and targets"
          destination: "PR02 Service Level Management"
        - name: "Availability design requirements"
          destination: "PR04 Service Design"
        - name: "Availability reports"
          destination: "PR20 Measurement & Reporting"
        - name: "Availability improvement actions"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: PR02
          direction: bidirectional
          description: "SLAs set targets; availability data feeds SLA evaluation"
        - process_id: PR07
          direction: bidirectional
          description: "Availability manages high-probability risks; continuity manages high-impact risks"
        - process_id: PR08
          direction: bidirectional
          description: "Performance and availability are complementary quality aspects"
        - process_id: PR11
          direction: in
          description: "Incident data reveals availability impact patterns"
        - process_id: PR14
          direction: in
          description: "Monitoring data provides availability measurements"
        - process_id: PR17
          direction: in
          description: "Service dependency maps identify single points of failure"
      activities:
        - name: "Identify availability requirements"
          description: "Work with customers to define what unavailability means and its business impact"
        - name: "Select availability metrics"
          description: "Choose metrics that reflect business impact, not just technical uptime"
        - name: "Design availability controls"
          description: "Identify single points of failure, design resilience, implement redundancy"
        - name: "Monitor and measure availability"
          description: "Track availability against agreed targets using business-relevant measures"
        - name: "Analyse availability data"
          description: "Identify trends, patterns, recurring failures, and improvement opportunities"
        - name: "Produce availability reports"
          description: "Report achieved availability in business terms to stakeholders"
      kpis:
        - name: "Service Availability"
          formula: "(Actual uptime / Agreed service hours) x 100"
          target: "Per SLA (typically >= 99.5%)"
        - name: "Mean Time Between Failures"
          formula: "Average time between service failures"
          target: "Trending upward"
        - name: "Single Points of Failure Addressed"
          formula: "(SPOFs with mitigation / Total identified SPOFs) x 100"
          target: ">= 90%"

    - id: PR07
      name: "Service Continuity Management"
      framework_practice_name: "Service Continuity Management"
      purpose: "Ensure availability and performance are maintained at sufficient levels in case of a disaster"
      scope: "Business impact analysis, continuity strategies, plan development, testing, and invocation"
      phase: D
      inputs:
        - name: "Business impact analysis data"
          source: "PR22 Relationship Management"
        - name: "Risk assessments"
          source: "PR21 Risk Management"
        - name: "Service dependency maps"
          source: "PR17 Service Configuration Management"
      outputs:
        - name: "Service continuity plans"
          destination: "Operations"
        - name: "Recovery objectives (RTO, RPO)"
          destination: "PR02 Service Level Management"
        - name: "Continuity test results"
          destination: "PR20 Measurement & Reporting"
        - name: "Continuity improvement actions"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: PR06
          direction: bidirectional
          description: "Availability manages high-probability risks; continuity manages high-impact disasters"
        - process_id: PR09
          direction: in
          description: "Security requirements inform continuity planning for cyber incidents"
        - process_id: PR21
          direction: in
          description: "Risk assessments identify threats requiring continuity plans"
        - process_id: PR17
          direction: in
          description: "Service dependencies determine recovery sequence"
      activities:
        - name: "Perform business impact analysis"
          description: "Quantify impact of service unavailability on provider and consumers"
        - name: "Develop continuity strategies"
          description: "Select recovery options, define risk mitigation measures, set recovery objectives"
        - name: "Develop and maintain continuity plans"
          description: "Document procedures for invocation, recovery, and return to normal operations"
        - name: "Conduct continuity exercises"
          description: "Test plan invocation through desktop, partial, and full exercises"
        - name: "Invoke continuity plans"
          description: "Execute plans during actual disruptive events, coordinate recovery"
        - name: "Review and improve continuity capability"
          description: "Analyse exercise results and actual invocations, update plans and strategies"
      kpis:
        - name: "Continuity Plan Coverage"
          formula: "(Critical services with tested continuity plans / Total critical services) x 100"
          target: "100%"
        - name: "Exercise Completion Rate"
          formula: "(Exercises completed on schedule / Total scheduled exercises) x 100"
          target: "100%"
        - name: "Recovery Objective Achievement"
          formula: "(Exercises meeting RTO/RPO targets / Total exercises) x 100"
          target: ">= 90%"

    - id: PR08
      name: "Capacity & Performance Management"
      framework_practice_name: "Capacity and Performance Management"
      purpose: "Ensure services achieve agreed performance levels and satisfy current and future demand cost-effectively"
      scope: "Performance requirements, monitoring, analysis, capacity planning, and optimization"
      phase: D
      inputs:
        - name: "SLA performance targets"
          source: "PR02 Service Level Management"
        - name: "Performance monitoring data"
          source: "PR14 Monitoring & Event Management"
        - name: "Business demand forecasts"
          source: "PR01 Service Portfolio Management"
      outputs:
        - name: "Performance data and targets"
          destination: "PR02 Service Level Management"
        - name: "Capacity plans and forecasts"
          destination: "PR04 Service Design"
        - name: "Performance reports"
          destination: "PR20 Measurement & Reporting"
        - name: "Capacity improvement actions"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: PR02
          direction: bidirectional
          description: "SLA targets drive performance requirements; performance data feeds SLA evaluation"
        - process_id: PR06
          direction: bidirectional
          description: "Performance and availability are complementary quality aspects"
        - process_id: PR14
          direction: in
          description: "Monitoring data provides performance measurements"
        - process_id: PR03
          direction: out
          description: "Capacity plans inform cost estimates for financial planning"
      activities:
        - name: "Identify performance requirements"
          description: "Define acceptable performance, degradation, and unavailability criteria"
        - name: "Select performance metrics"
          description: "Choose metrics that reflect business impact of capacity and performance"
        - name: "Monitor and measure performance"
          description: "Track service and resource performance against agreed targets"
        - name: "Analyse capacity and performance data"
          description: "Identify trends, constraints, bottlenecks, and optimization opportunities"
        - name: "Produce capacity plans"
          description: "Forecast demand, plan resource requirements, balance cost and capability"
        - name: "Optimize performance controls"
          description: "Tune configurations, recommend upgrades, implement efficiency improvements"
      kpis:
        - name: "Performance Target Achievement"
          formula: "(Performance targets met / Total performance targets) x 100"
          target: ">= 95%"
        - name: "Capacity Plan Accuracy"
          formula: "(Forecast demand - Actual demand) / Forecast demand x 100"
          target: "Variance within +/- 15%"
        - name: "Resource Utilization Efficiency"
          formula: "Average resource utilization across critical infrastructure"
          target: "60-80% (avoiding over/under provisioning)"

    - id: PR18
      name: "IT Asset Management"
      framework_practice_name: "IT Asset Management"
      purpose: "Plan and manage the full lifecycle of IT assets to maximize value, control costs, and manage risks"
      scope: "Asset lifecycle from planning through acquisition, assignment, utilization, decommissioning, and disposal"
      phase: D
      inputs:
        - name: "Procurement requests"
          source: "All practices"
        - name: "Configuration data"
          source: "PR17 Service Configuration Management"
        - name: "Financial data and budgets"
          source: "PR03 Service Financial Management"
        - name: "Licence compliance requirements"
          source: "PR09 Information Security Management"
      outputs:
        - name: "Asset register data"
          destination: "PR17 Service Configuration Management"
        - name: "Asset cost information"
          destination: "PR03 Service Financial Management"
        - name: "Licence compliance reports"
          destination: "PR09 Information Security Management"
        - name: "Asset lifecycle reports"
          destination: "PR20 Measurement & Reporting"
      interfaces:
        - process_id: PR17
          direction: bidirectional
          description: "Asset register and CMDB are complementary data sources"
        - process_id: PR03
          direction: bidirectional
          description: "Asset costs feed financial management; budgets fund asset procurement"
        - process_id: PR15
          direction: in
          description: "Changes may trigger asset additions, modifications, or retirements"
        - process_id: PR09
          direction: bidirectional
          description: "Security requirements apply to asset management; asset data informs security scope"
      activities:
        - name: "Define asset management approach"
          description: "Establish asset types, lifecycle models, register structure, and governance"
        - name: "Plan and budget for assets"
          description: "Assess needs, select acquisition methods, budget with procurement and finance"
        - name: "Acquire and register assets"
          description: "Capture all documentation at acquisition, register in asset management system"
        - name: "Assign and track assets"
          description: "Delegate responsibility to consumers, log assignments, manage IMAC activities"
        - name: "Optimize asset utilization"
          description: "Monitor usage, track key dates, identify underutilized assets, manage licences"
        - name: "Decommission and dispose of assets"
          description: "Retrieve assets, handle data per security policy, manage disposal per regulations"
      kpis:
        - name: "Asset Register Accuracy"
          formula: "(Assets verified as accurate / Total assets audited) x 100"
          target: ">= 95%"
        - name: "Licence Compliance Rate"
          formula: "(Compliant licences / Total licences in use) x 100"
          target: "100%"
        - name: "Asset Utilization Rate"
          formula: "(Actively utilized assets / Total deployed assets) x 100"
          target: ">= 85%"

    - id: PR19
      name: "Knowledge Management"
      framework_practice_name: "Knowledge Management"
      purpose: "Maintain and improve effective use of information and knowledge across the organization"
      scope: "Knowledge environment, DIKW transformation, tacit/explicit knowledge, knowledge asset lifecycle"
      phase: D
      inputs:
        - name: "Incident resolution data"
          source: "PR11 Incident Management"
        - name: "Known errors and workarounds"
          source: "PR13 Problem Management"
        - name: "Service design documentation"
          source: "PR04 Service Design"
        - name: "Lessons learned from reviews"
          source: "PR24 Continual Improvement"
      outputs:
        - name: "Knowledge articles and base"
          destination: "PR10 Service Desk"
        - name: "Operational procedures"
          destination: "All operations practices"
        - name: "Knowledge quality reports"
          destination: "PR20 Measurement & Reporting"
      interfaces:
        - process_id: PR10
          direction: out
          description: "Knowledge base supports first-line resolution at service desk"
        - process_id: PR11
          direction: in
          description: "Incident resolutions generate new knowledge articles"
        - process_id: PR13
          direction: in
          description: "Known errors and workarounds are key knowledge assets"
        - process_id: PR24
          direction: bidirectional
          description: "Lessons learned feed knowledge base; knowledge gaps drive improvement"
      activities:
        - name: "Establish knowledge management environment"
          description: "Define scope, tools, taxonomies, access controls, and governance model"
        - name: "Capture and create knowledge"
          description: "Transform tacit knowledge to explicit through documentation and collaboration"
        - name: "Organize and classify knowledge"
          description: "Structure knowledge assets using agreed taxonomies and metadata"
        - name: "Share and distribute knowledge"
          description: "Make knowledge available through appropriate channels and formats"
        - name: "Use and apply knowledge"
          description: "Support decision-making through accessible, relevant, timely knowledge"
        - name: "Review and maintain knowledge quality"
          description: "Assess relevance, accuracy, and completeness; archive or retire outdated content"
      kpis:
        - name: "Knowledge Article Usage Rate"
          formula: "(Incidents resolved using knowledge articles / Total incidents) x 100"
          target: ">= 30%"
        - name: "Knowledge Base Currency"
          formula: "(Articles reviewed within cycle / Total articles) x 100"
          target: ">= 90%"
        - name: "Knowledge Contribution Rate"
          formula: "New or updated knowledge articles per period"
          target: "Trending upward"

    - id: PR20
      name: "Measurement & Reporting"
      framework_practice_name: "Measurement and Reporting"
      purpose: "Support good decision-making and continual improvement by decreasing levels of uncertainty through valid data assessment"
      scope: "Measurement approach, metrics design, report specification, data gathering, report production and distribution"
      phase: D
      inputs:
        - name: "SLA targets and metrics requirements"
          source: "PR02 Service Level Management"
        - name: "Performance and monitoring data"
          source: "PR14 Monitoring & Event Management"
        - name: "Process performance data"
          source: "All practices"
      outputs:
        - name: "Service reports for customers"
          destination: "PR22 Relationship Management"
        - name: "Management reports"
          destination: "SMS governance"
        - name: "KPI dashboards"
          destination: "All practices"
        - name: "Improvement insights"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: PR02
          direction: in
          description: "SLA targets and evaluation data form primary reporting input"
        - process_id: PR14
          direction: in
          description: "Monitoring data feeds operational and service reports"
        - process_id: PR22
          direction: out
          description: "Service reports support customer communication"
        - process_id: PR24
          direction: out
          description: "Report analysis identifies improvement opportunities"
      activities:
        - name: "Define measurement and reporting approach"
          description: "Establish organization-wide approach linking measurements to objectives"
        - name: "Identify reporting requirements"
          description: "Gather requirements from SLAs, customers, and internal stakeholders"
        - name: "Develop metrics and KPI scorecards"
          description: "Define metrics, measurement methods, targets, thresholds, and aggregation"
        - name: "Design report templates"
          description: "Create templates tailored to audience needs and decision-making contexts"
        - name: "Gather and process measurement data"
          description: "Collect data from multiple sources, validate quality, apply calculations"
        - name: "Produce and distribute reports"
          description: "Generate operational and analytical reports, distribute through agreed channels"
        - name: "Review and optimize measurements"
          description: "Assess metric relevance, report effectiveness, and measurement costs"
      kpis:
        - name: "Report Delivery Timeliness"
          formula: "(Reports delivered on time / Total reports due) x 100"
          target: ">= 95%"
        - name: "Stakeholder Satisfaction with Reports"
          formula: "Average satisfaction score from report consumers (scale 1-5)"
          target: ">= 4.0 / 5"
        - name: "Measurement Coverage"
          formula: "(Processes with defined KPIs / Total in-scope processes) x 100"
          target: "100%"

    - id: PR21
      name: "Risk Management"
      framework_practice_name: "Risk Management"
      purpose: "Ensure the organization understands and effectively handles risks to protect value creation"
      scope: "Risk identification, analysis, evaluation, treatment, monitoring, and governance"
      phase: D
      inputs:
        - name: "Organizational strategy and objectives"
          source: "SMS governance"
        - name: "Security risk assessments"
          source: "PR09 Information Security Management"
        - name: "Change risk assessments"
          source: "PR15 Change Management"
        - name: "Continuity threat assessments"
          source: "PR07 Service Continuity Management"
      outputs:
        - name: "Risk register"
          destination: "All practices"
        - name: "Risk appetite and capacity guidance"
          destination: "SMS governance"
        - name: "Risk treatment plans"
          destination: "Relevant practices"
        - name: "Risk reports"
          destination: "PR20 Measurement & Reporting"
      interfaces:
        - process_id: PR07
          direction: bidirectional
          description: "Risk assessments identify continuity threats; continuity planning reduces risk"
        - process_id: PR09
          direction: bidirectional
          description: "Security risks feed risk register; risk appetite governs security controls"
        - process_id: PR15
          direction: out
          description: "Risk assessment informs change authorization decisions"
        - process_id: PR24
          direction: bidirectional
          description: "Risk findings drive improvement; improvements reduce risk exposure"
      activities:
        - name: "Establish risk management framework"
          description: "Define risk policy, governance, capacity, appetite, and assessment methods"
        - name: "Identify risks"
          description: "Systematically identify threats and opportunities across all dimensions"
        - name: "Analyse and evaluate risks"
          description: "Assess likelihood and impact, calculate risk scores, compare against appetite"
        - name: "Determine risk treatment"
          description: "Select treatment options — avoid, mitigate, transfer, accept, or exploit"
        - name: "Implement risk controls"
          description: "Deploy controls, assign risk owners, establish monitoring mechanisms"
        - name: "Monitor and review risks"
          description: "Track risk status, reassess periodically, update register, report to governance"
      kpis:
        - name: "Risk Register Currency"
          formula: "(Risks reviewed within cycle / Total risks in register) x 100"
          target: ">= 95%"
        - name: "Risk Treatment Completion"
          formula: "(Risks with implemented treatment plans / Risks requiring treatment) x 100"
          target: ">= 90%"
        - name: "Overdue Risk Actions"
          formula: "Count of risk actions past their agreed completion date"
          target: "Zero"

    - id: PR24
      name: "Continual Improvement"
      framework_practice_name: "Continual Improvement"
      purpose: "Align practices and services with changing business needs through ongoing improvement"
      scope: "Improvement culture, opportunity identification, initiative prioritization, implementation, and evaluation"
      phase: D
      inputs:
        - name: "Service review findings"
          source: "PR02 Service Level Management"
        - name: "Incident and problem analysis"
          source: "PR11, PR13"
        - name: "Audit and assessment results"
          source: "PR09, PR21"
        - name: "Customer and user feedback"
          source: "PR22 Relationship Management"
      outputs:
        - name: "Improvement initiatives"
          destination: "All practices"
        - name: "Continual improvement register"
          destination: "SMS governance"
        - name: "Improvement results and lessons learned"
          destination: "PR19 Knowledge Management"
      interfaces:
        - process_id: PR02
          direction: in
          description: "SLA gaps and service review findings feed improvement register"
        - process_id: PR15
          direction: out
          description: "Improvements requiring changes go through change management"
        - process_id: PR19
          direction: out
          description: "Lessons learned from improvements feed knowledge management"
        - process_id: PR20
          direction: in
          description: "Measurement data identifies improvement opportunities"
        - process_id: PR22
          direction: in
          description: "Customer feedback and complaints drive improvement priorities"
      activities:
        - name: "Establish improvement culture"
          description: "Nurture organization-wide commitment to continual improvement"
        - name: "Identify improvement opportunities"
          description: "Capture opportunities from all sources — reviews, incidents, feedback, audits"
        - name: "Assess and prioritize improvements"
          description: "Evaluate business justification, effort, risk, and expected benefit"
        - name: "Plan improvement initiatives"
          description: "Define scope, resources, timeline, success criteria, and implementation approach"
        - name: "Implement improvements"
          description: "Execute initiatives through appropriate delivery mechanisms"
        - name: "Evaluate improvement results"
          description: "Measure outputs, outcomes, efficiency, risks, and costs against expectations"
        - name: "Maintain the continual improvement register"
          description: "Log all opportunities, track initiative lifecycle, report progress"
        - name: "Share lessons learned"
          description: "Document and communicate what worked, what did not, and why"
      kpis:
        - name: "Improvement Initiative Completion Rate"
          formula: "(Initiatives completed on time / Total approved initiatives) x 100"
          target: ">= 80%"
        - name: "Improvement Benefit Realization"
          formula: "(Initiatives achieving target benefits / Total completed initiatives) x 100"
          target: ">= 70%"
        - name: "CIR Currency"
          formula: "(Initiatives updated within review cycle / Total active initiatives) x 100"
          target: "100%"

