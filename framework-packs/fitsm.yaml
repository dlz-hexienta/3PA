# 3PA Framework Pack: FitSM v3
# Generated from FitSM-0 through FitSM-6 source documents and 3PA best practices
# Maps FitSM's 14 processes to 16 of 3PA's 24 unified process model

meta:
  name: "FitSM v3"
  version: "0.1"
  framework_id: fitsm
  description: "Lightweight IT service management standard for federated infrastructures"
  source_version: "3.0.1"
  last_updated: "2026-03-15"
  keywords:
    - fitsm
    - fit-sm
    - lightweight
    - federated
    - "lightweight itsm"
    - fitsm-1
    - fitsm-2

process_model:
  processes:
    # ── Phase A (Foundation) ──────────────────────────────────────────────

    - id: "PR01"
      name: "Service Portfolio Management"
      framework_process_id: "PR1"
      purpose: "Maintain the service portfolio and manage services through their lifecycle"
      scope: "All services offered by the service provider — proposed, in development, live, and retired — including federation member contributions"
      phase: "A"
      inputs:
        - name: "Customer demand and service proposals"
          source: "PR22 Relationship Management"
        - name: "Service performance data"
          source: "PR02 Service Level Management"
        - name: "Change proposals affecting portfolio composition"
          source: "PR15 Change Management"
      outputs:
        - name: "Updated service portfolio register"
          destination: "PR02 Service Level Management"
        - name: "Service lifecycle transition decisions"
          destination: "PR15 Change Management"
        - name: "Portfolio roadmap for stakeholder communication"
          destination: "PR22 Relationship Management"
      interfaces:
        - process_id: "PR02"
          direction: "bidirectional"
          description: "Portfolio decisions inform SLA scope; service performance feeds portfolio reviews"
        - process_id: "PR15"
          direction: "bidirectional"
          description: "Portfolio-driven changes and change proposals affecting the portfolio"
        - process_id: "PR22"
          direction: "bidirectional"
          description: "Customer demand feeds portfolio; portfolio roadmap communicated to customers"
        - process_id: "PR24"
          direction: "in"
          description: "Improvement initiatives may affect portfolio composition"
      activities:
        - name: "Establish and maintain the service portfolio"
          description: "Create and update the service portfolio register listing all services with their lifecycle status, owners, and delivery parties"
        - name: "Evaluate service proposals"
          description: "Assess proposals for new or changed services against defined criteria covering demand, resources, and expected benefits"
        - name: "Manage service lifecycle transitions"
          description: "Plan and coordinate the transition of services between lifecycle phases including new service introduction and retirement"
        - name: "Identify federation member contributions"
          description: "For each service, identify the internal and external suppliers including federation members, their contact points and responsibilities"
        - name: "Conduct periodic portfolio reviews"
          description: "Review the portfolio at planned intervals to validate alignment with strategy and make investment decisions"
      kpis:
        - name: "Portfolio completeness"
          formula: "(Services in portfolio register / Total known live services) x 100"
          target: "100%"
        - name: "Proposal evaluation rate"
          formula: "(Proposals evaluated within SLA / Total proposals submitted) x 100"
          target: ">= 90%"
        - name: "Portfolio currency"
          formula: "(Portfolio entries updated within review cycle / Total portfolio entries) x 100"
          target: ">= 95%"

    - id: "PR09"
      name: "Information Security Management"
      framework_process_id: "PR6"
      purpose: "Preserve confidentiality, integrity, and availability of information related to managing and delivering services"
      scope: "All information assets within the SMS scope, including security policies, risk assessments, controls, events, incidents, and access management"
      phase: "A"
      inputs:
        - name: "Security requirements from SLAs and regulations"
          source: "PR02 Service Level Management"
        - name: "Security events and incidents"
          source: "PR11 Incident Management"
        - name: "Configuration data on security-relevant CIs"
          source: "PR17 Service Configuration Management"
      outputs:
        - name: "Information security policies and controls"
          destination: "All processes"
        - name: "Security risk assessment results"
          destination: "PR08 Capacity & Performance Management"
        - name: "Access control procedures"
          destination: "PR15 Change Management"
      interfaces:
        - process_id: "PR11"
          direction: "bidirectional"
          description: "Security incidents are escalated from incident management; security guidance feeds incident handling"
        - process_id: "PR15"
          direction: "bidirectional"
          description: "Security assessments inform change approval; changes to security controls follow change management"
        - process_id: "PR17"
          direction: "in"
          description: "CMDB provides CI data needed for security risk assessments"
      activities:
        - name: "Define and review information security policies"
          description: "Establish information security requirements and review policies at planned intervals"
        - name: "Assess information security risks"
          description: "Identify, assess, and prioritize information security risks at planned intervals"
        - name: "Implement security controls"
          description: "Deploy physical, technical, and organizational controls to mitigate identified security risks"
        - name: "Handle security events and incidents"
          description: "Detect, classify, and respond to information security events and incidents in a consistent manner"
        - name: "Manage access control"
          description: "Control provisioning of access rights for information-processing systems and services"
      kpis:
        - name: "Security policy review adherence"
          formula: "(Security policies reviewed on schedule / Total security policies) x 100"
          target: "100%"
        - name: "Security incident response time"
          formula: "Average time from security event detection to initial response"
          target: "<= 4 hours for high-severity events"
        - name: "Security risk assessment coverage"
          formula: "(Services with current risk assessment / Total services) x 100"
          target: ">= 95%"

    - id: "PR17"
      name: "Service Configuration Management"
      framework_process_id: "PR11"
      purpose: "Provide and maintain a logical model of configuration items in support of other service management activities"
      scope: "All configuration items within the SMS scope, their attributes, relationships, and the CMDB that stores this information"
      phase: "A"
      inputs:
        - name: "Change records affecting CIs"
          source: "PR15 Change Management"
        - name: "Release deployment records"
          source: "PR16 Release & Deployment Management"
        - name: "Incident and problem data referencing CIs"
          source: "PR11 Incident Management"
      outputs:
        - name: "Accurate CI information and relationship data"
          destination: "All processes"
        - name: "Configuration baselines"
          destination: "PR15 Change Management"
        - name: "CI audit and verification reports"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: "PR15"
          direction: "bidirectional"
          description: "Changes update CI records; CMDB data informs change impact assessment"
        - process_id: "PR16"
          direction: "in"
          description: "Releases update CI records upon deployment"
        - process_id: "PR11"
          direction: "in"
          description: "Incidents reference affected CIs for diagnosis"
      activities:
        - name: "Define configuration management scope"
          description: "Determine the types of CIs and relationships to be tracked and the required level of detail"
        - name: "Maintain the CMDB"
          description: "Record and update information on CIs and their relationships in the configuration management database"
        - name: "Control configuration items"
          description: "Ensure CIs are controlled and changes to CIs tracked in the CMDB"
        - name: "Verify configuration information"
          description: "Conduct planned verifications to ensure CMDB data accuracy and completeness"
      kpis:
        - name: "CMDB accuracy"
          formula: "(CIs verified as accurate / Total CIs audited) x 100"
          target: ">= 95%"
        - name: "Configuration verification adherence"
          formula: "(Verifications completed on schedule / Planned verifications) x 100"
          target: "100%"

    # ── Phase B (Agreements) ──────────────────────────────────────────────

    - id: "PR02"
      name: "Service Level Management"
      framework_process_id: "PR2"
      purpose: "Maintain service catalogues, and define and evaluate agreements on service quality with customers and suppliers"
      scope: "Service catalogue maintenance, SLA negotiation and review, OLA and UA management, and service performance evaluation against agreed targets"
      phase: "B"
      inputs:
        - name: "Service portfolio decisions"
          source: "PR01 Service Portfolio Management"
        - name: "Customer requirements and expectations"
          source: "PR22 Relationship Management"
        - name: "Service performance reports"
          source: "PR20 Measurement & Reporting"
      outputs:
        - name: "Service catalogue"
          destination: "All processes"
        - name: "Service level agreements"
          destination: "PR11 Incident Management"
        - name: "Operational level agreements and underpinning agreements"
          destination: "PR23 Supplier Management"
      interfaces:
        - process_id: "PR01"
          direction: "bidirectional"
          description: "Portfolio decisions scope the catalogue; service performance feeds portfolio reviews"
        - process_id: "PR11"
          direction: "out"
          description: "SLA targets drive incident prioritization and escalation"
        - process_id: "PR22"
          direction: "bidirectional"
          description: "Customer requirements inform SLAs; SLA performance is communicated to customers"
        - process_id: "PR23"
          direction: "out"
          description: "OLAs and UAs are negotiated to underpin customer-facing SLAs"
      activities:
        - name: "Maintain the service catalogue"
          description: "Keep a current, customer-facing catalogue of all live services with relevant descriptions"
        - name: "Negotiate and manage SLAs"
          description: "Define, agree, and periodically review service level agreements for all delivered services"
        - name: "Evaluate service performance"
          description: "Measure actual service performance against SLA targets and identify deviations"
        - name: "Manage OLAs and UAs"
          description: "Agree and review operational level agreements and underpinning agreements that support customer SLAs"
        - name: "Conduct service reviews"
          description: "Hold periodic reviews with customers to assess service quality and identify improvement opportunities"
      kpis:
        - name: "SLA coverage"
          formula: "(Services with active SLA / Total live services) x 100"
          target: "100%"
        - name: "SLA target achievement"
          formula: "(SLA targets met / Total SLA targets measured) x 100"
          target: ">= 95%"
        - name: "Service review adherence"
          formula: "(Service reviews conducted on schedule / Planned reviews) x 100"
          target: "100%"

    - id: "PR22"
      name: "Relationship Management"
      framework_process_id: "PR7"
      purpose: "Establish and maintain good relationships with customers receiving services"
      scope: "Customer identification, communication channels, service reviews, complaint handling, and customer satisfaction management"
      phase: "B"
      inputs:
        - name: "Service performance reports"
          source: "PR20 Measurement & Reporting"
        - name: "SLA performance data"
          source: "PR02 Service Level Management"
        - name: "Incident and request status updates"
          source: "PR11 Incident Management"
      outputs:
        - name: "Customer requirements and demand signals"
          destination: "PR01 Service Portfolio Management"
        - name: "Service complaints and feedback"
          destination: "PR24 Continual Improvement"
        - name: "Customer satisfaction data"
          destination: "PR20 Measurement & Reporting"
      interfaces:
        - process_id: "PR02"
          direction: "bidirectional"
          description: "Customer requirements inform SLAs; SLA performance reviewed in customer meetings"
        - process_id: "PR01"
          direction: "out"
          description: "Customer demand signals feed portfolio decisions"
        - process_id: "PR24"
          direction: "out"
          description: "Customer feedback drives improvement initiatives"
      activities:
        - name: "Identify service customers"
          description: "Maintain a register of all service customers and their designated contacts"
        - name: "Establish communication channels"
          description: "Define and maintain channels for customer communication including ordering, escalation, and complaint mechanisms"
        - name: "Conduct service reviews with customers"
          description: "Hold periodic service reviews to discuss performance, address concerns, and identify needs"
        - name: "Handle service complaints"
          description: "Receive, investigate, and resolve customer complaints in a consistent manner"
        - name: "Manage customer satisfaction"
          description: "Measure, track, and take action to improve customer satisfaction"
      kpis:
        - name: "Customer satisfaction score"
          formula: "Average score from customer satisfaction surveys (scale 1-5)"
          target: ">= 3.5 / 5"
        - name: "Complaint resolution rate"
          formula: "(Complaints resolved within target time / Total complaints) x 100"
          target: ">= 90%"

    - id: "PR23"
      name: "Supplier Management"
      framework_process_id: "PR8"
      purpose: "Establish and maintain healthy relationships with internal and external suppliers and monitor their performance"
      scope: "Supplier identification, communication channels, performance evaluation, and contract management for all suppliers including federation members"
      phase: "B"
      inputs:
        - name: "OLAs and UAs requiring supplier alignment"
          source: "PR02 Service Level Management"
        - name: "Supplier performance data"
          source: "PR20 Measurement & Reporting"
      outputs:
        - name: "Supplier performance evaluations"
          destination: "PR02 Service Level Management"
        - name: "Supplier risk information"
          destination: "PR09 Information Security Management"
      interfaces:
        - process_id: "PR02"
          direction: "bidirectional"
          description: "UAs and OLAs drive supplier requirements; supplier performance feeds SLA evaluation"
        - process_id: "PR15"
          direction: "in"
          description: "Changes to supplier contracts follow change management"
      activities:
        - name: "Identify suppliers"
          description: "Maintain a register of all internal and external suppliers including federation members"
        - name: "Establish supplier communication channels"
          description: "Define communication mechanisms and escalation paths for each supplier"
        - name: "Evaluate supplier performance"
          description: "Monitor and evaluate supplier performance at planned intervals against agreed targets"
        - name: "Manage supplier relationships"
          description: "Maintain designated contacts for each supplier and conduct regular relationship reviews"
      kpis:
        - name: "Supplier performance evaluation adherence"
          formula: "(Supplier evaluations completed on schedule / Planned evaluations) x 100"
          target: "100%"
        - name: "Supplier contract compliance"
          formula: "(Suppliers meeting contractual targets / Total active suppliers) x 100"
          target: ">= 90%"

    # ── Phase C (Operations) ──────────────────────────────────────────────

    - id: "PR11"
      name: "Incident Management"
      framework_process_id: "PR9"
      purpose: "Restore agreed service operation after an incident as quickly as possible"
      scope: "Registration, classification, prioritization, escalation, resolution, and closure of incidents including major incident handling"
      phase: "C"
      inputs:
        - name: "User reports and monitoring alerts"
          source: "External / PR20 Measurement & Reporting"
        - name: "SLA targets for prioritization"
          source: "PR02 Service Level Management"
        - name: "Known errors and workarounds"
          source: "PR13 Problem Management"
      outputs:
        - name: "Incident records"
          destination: "PR13 Problem Management"
        - name: "Resolved and closed incident records"
          destination: "PR20 Measurement & Reporting"
        - name: "Major incident notifications"
          destination: "PR22 Relationship Management"
      interfaces:
        - process_id: "PR12"
          direction: "bidirectional"
          description: "Incidents and service requests share registration and classification; FitSM treats them as a single process (ISRM)"
        - process_id: "PR13"
          direction: "out"
          description: "Incident trends and recurring incidents trigger problem investigation"
        - process_id: "PR02"
          direction: "in"
          description: "SLA targets inform incident prioritization and escalation thresholds"
        - process_id: "PR17"
          direction: "in"
          description: "CMDB data supports incident diagnosis"
      activities:
        - name: "Register and classify incidents"
          description: "Record all incidents consistently with classification, categorization, and priority based on SLA targets"
        - name: "Investigate and resolve incidents"
          description: "Diagnose incidents using known errors and workarounds, escalate functionally and hierarchically as needed"
        - name: "Manage escalation"
          description: "Perform functional and hierarchical escalation in a consistent manner per defined rules"
        - name: "Communicate with users"
          description: "Keep customers and users informed of incident progress as appropriate"
        - name: "Close incidents"
          description: "Verify resolution with the user and close the incident record"
        - name: "Handle major incidents"
          description: "Identify and manage major incidents based on defined criteria using a dedicated procedure"
      kpis:
        - name: "First-contact resolution rate"
          formula: "(Incidents resolved at first contact / Total incidents) x 100"
          target: ">= 60%"
        - name: "Mean time to restore service"
          formula: "Average(Resolution time - Report time) for all incidents in period"
          target: "Within SLA targets per priority level"
        - name: "SLA breach rate for incidents"
          formula: "(Incidents exceeding SLA resolution target / Total incidents) x 100"
          target: "<= 5%"

    - id: "PR12"
      name: "Service Request Management"
      framework_process_id: "PR9"
      purpose: "Respond to user service requests in a timely and effective manner"
      scope: "Registration, classification, prioritization, fulfilment, and closure of service requests"
      phase: "C"
      inputs:
        - name: "User service requests"
          source: "External"
        - name: "Service catalogue defining available requests"
          source: "PR02 Service Level Management"
        - name: "SLA targets for fulfilment"
          source: "PR02 Service Level Management"
      outputs:
        - name: "Fulfilled service request records"
          destination: "PR20 Measurement & Reporting"
        - name: "Request fulfilment data"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: "PR11"
          direction: "bidirectional"
          description: "Incidents and service requests share registration and classification in FitSM ISRM"
        - process_id: "PR02"
          direction: "in"
          description: "Service catalogue and SLA targets define available requests and fulfilment targets"
      activities:
        - name: "Register and classify service requests"
          description: "Record all service requests consistently with appropriate classification and priority"
        - name: "Fulfil service requests"
          description: "Process requests following defined fulfilment procedures, taking account of SLA targets"
        - name: "Communicate with requestors"
          description: "Keep users informed of request progress and expected completion"
        - name: "Close service requests"
          description: "Confirm fulfilment with the requestor and close the service request record"
      kpis:
        - name: "Service request fulfilment rate"
          formula: "(Requests fulfilled within SLA / Total requests) x 100"
          target: ">= 95%"
        - name: "Service request backlog"
          formula: "Count of open service requests older than the target fulfilment time"
          target: "Trending downward"

    - id: "PR13"
      name: "Problem Management"
      framework_process_id: "PR10"
      purpose: "Identify and investigate problems to reduce their impact and prevent incidents from recurring"
      scope: "Problem identification, investigation, root cause analysis, known error management, and workaround documentation"
      phase: "C"
      inputs:
        - name: "Incident trend data"
          source: "PR11 Incident Management"
        - name: "Recurring incident patterns"
          source: "PR20 Measurement & Reporting"
      outputs:
        - name: "Known errors and workarounds"
          destination: "PR11 Incident Management"
        - name: "Change requests for permanent fixes"
          destination: "PR15 Change Management"
        - name: "Problem resolution data"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: "PR11"
          direction: "bidirectional"
          description: "Incident patterns trigger problems; known errors and workarounds feed back to incident resolution"
        - process_id: "PR15"
          direction: "out"
          description: "Permanent fixes require change requests"
        - process_id: "PR17"
          direction: "in"
          description: "CMDB data supports root cause analysis"
      activities:
        - name: "Identify and register problems"
          description: "Analyse incident patterns and trends to identify problems and register them consistently"
        - name: "Investigate problems"
          description: "Perform root cause analysis to identify resolution actions or impact reduction measures"
        - name: "Manage known errors"
          description: "Register known errors with documented workarounds when permanent resolution is not yet available"
        - name: "Maintain known error information"
          description: "Keep up-to-date information on known errors and effective workarounds for use by incident staff"
      kpis:
        - name: "Problems resolved within target"
          formula: "(Problems resolved within SLA / Total problems) x 100"
          target: ">= 80%"
        - name: "Known error database currency"
          formula: "(Known errors reviewed within cycle / Total active known errors) x 100"
          target: ">= 90%"

    - id: "PR15"
      name: "Change Management"
      framework_process_id: "PR12"
      purpose: "Plan, approve, and review changes in a controlled manner to avoid adverse impact on services"
      scope: "Registration, classification, assessment, approval, scheduling, post-implementation review, and closure of all changes"
      phase: "C"
      inputs:
        - name: "Requests for change"
          source: "All processes"
        - name: "CI impact data"
          source: "PR17 Service Configuration Management"
        - name: "Release schedules"
          source: "PR16 Release & Deployment Management"
      outputs:
        - name: "Approved change records"
          destination: "PR16 Release & Deployment Management"
        - name: "Updated change schedule"
          destination: "All processes"
        - name: "Post-implementation review findings"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: "PR16"
          direction: "out"
          description: "Approved changes are bundled into releases for deployment"
        - process_id: "PR17"
          direction: "bidirectional"
          description: "CMDB data informs impact assessment; changes update CI records"
        - process_id: "PR06"
          direction: "in"
          description: "Availability impact assessments inform change approval"
        - process_id: "PR09"
          direction: "in"
          description: "Security assessments inform change approval for security-relevant changes"
      activities:
        - name: "Register and classify changes"
          description: "Record all changes consistently with classification covering standard, normal, emergency, and major changes"
        - name: "Assess changes"
          description: "Evaluate benefits, risks, potential impact, effort, and technical feasibility for each change"
        - name: "Approve changes"
          description: "Obtain approval at the appropriate authority level based on defined criteria and CAB review"
        - name: "Manage the change schedule"
          description: "Maintain a schedule of approved changes with deployment dates, communicated to interested parties"
        - name: "Conduct post-implementation reviews"
          description: "Review implemented changes for success or failure and close change records"
      kpis:
        - name: "Change success rate"
          formula: "(Changes implemented without rollback or unplanned outage / Total implemented changes) x 100"
          target: ">= 90%"
        - name: "Emergency change ratio"
          formula: "(Emergency changes / Total changes) x 100"
          target: "<= 10%"
        - name: "Change assessment completeness"
          formula: "(Changes with completed impact assessment / Total changes submitted) x 100"
          target: "100%"

    - id: "PR16"
      name: "Release & Deployment Management"
      framework_process_id: "PR13"
      purpose: "Bundle approved changes into appropriate types of releases and effectively deploy them"
      scope: "Release strategy definition, release planning, build and test, deployment, and post-deployment evaluation"
      phase: "C"
      inputs:
        - name: "Approved change records"
          source: "PR15 Change Management"
        - name: "CI data for release components"
          source: "PR17 Service Configuration Management"
      outputs:
        - name: "Deployed releases"
          destination: "PR17 Service Configuration Management"
        - name: "Deployment evaluation reports"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: "PR15"
          direction: "in"
          description: "Approved changes are the primary input for release packaging"
        - process_id: "PR17"
          direction: "bidirectional"
          description: "CMDB data identifies release components; deployments update CI records"
      activities:
        - name: "Define release and deployment strategies"
          description: "Establish strategies covering CI scope, frequency, impact, and supporting technology"
        - name: "Define release inclusion criteria"
          description: "Determine which approved changes are included in each release based on strategy and timing"
        - name: "Plan and build releases"
          description: "Plan deployment including acceptance criteria and build the release package"
        - name: "Test and evaluate releases"
          description: "Test releases against acceptance criteria appropriate to the release type and service impact"
        - name: "Deploy releases"
          description: "Execute deployment with preparation for rollback in case of unsuccessful deployment"
        - name: "Evaluate deployment outcomes"
          description: "Assess deployment activities for success or failure and document lessons learned"
      kpis:
        - name: "Release success rate"
          formula: "(Releases deployed without rollback / Total releases deployed) x 100"
          target: ">= 95%"
        - name: "Release on-time delivery"
          formula: "(Releases deployed within planned window / Total planned releases) x 100"
          target: ">= 90%"

    # ── Phase D (Assurance) ───────────────────────────────────────────────

    - id: "PR06"
      name: "Availability Management"
      framework_process_id: "PR4"
      purpose: "Ensure sufficient service availability to meet service targets"
      scope: "Availability requirements identification, risk assessment, availability planning, monitoring, and improvement measures"
      phase: "D"
      inputs:
        - name: "SLA availability targets"
          source: "PR02 Service Level Management"
        - name: "Incident data on service outages"
          source: "PR11 Incident Management"
        - name: "CI dependency data"
          source: "PR17 Service Configuration Management"
      outputs:
        - name: "Availability plans and requirements"
          destination: "PR15 Change Management"
        - name: "Availability monitoring data"
          destination: "PR20 Measurement & Reporting"
      interfaces:
        - process_id: "PR07"
          direction: "bidirectional"
          description: "FitSM combines availability and continuity in PR4 SACM; availability and continuity planning are closely linked"
        - process_id: "PR02"
          direction: "in"
          description: "SLA targets define availability requirements"
        - process_id: "PR15"
          direction: "out"
          description: "Availability improvement measures are implemented through change management"
      activities:
        - name: "Identify availability requirements"
          description: "Determine service availability requirements at planned intervals taking into account SLA targets"
        - name: "Assess availability risks"
          description: "Evaluate availability risks at planned intervals and identify single points of failure"
        - name: "Plan availability measures"
          description: "Define appropriate measures to reduce the probability and impact of availability risks"
        - name: "Monitor service availability"
          description: "Continuously monitor the availability of services and service components"
      kpis:
        - name: "Service availability"
          formula: "(Agreed uptime - Downtime) / Agreed uptime x 100"
          target: "Per SLA targets, typically >= 99.5%"
        - name: "Availability plan currency"
          formula: "(Availability plans reviewed within cycle / Total availability plans) x 100"
          target: "100%"

    - id: "PR07"
      name: "Service Continuity Management"
      framework_process_id: "PR4"
      purpose: "Ensure sufficient service continuity to meet agreed targets even in exceptional circumstances"
      scope: "Continuity requirements identification, risk assessment, continuity planning, testing, and recovery preparedness"
      phase: "D"
      inputs:
        - name: "SLA continuity targets"
          source: "PR02 Service Level Management"
        - name: "Availability risk assessments"
          source: "PR06 Availability Management"
        - name: "CI dependency data"
          source: "PR17 Service Configuration Management"
      outputs:
        - name: "Service continuity plans"
          destination: "PR15 Change Management"
        - name: "Continuity test results"
          destination: "PR24 Continual Improvement"
      interfaces:
        - process_id: "PR06"
          direction: "bidirectional"
          description: "FitSM combines availability and continuity in PR4 SACM; continuity builds on availability risk data"
        - process_id: "PR02"
          direction: "in"
          description: "SLA targets define continuity requirements"
        - process_id: "PR15"
          direction: "out"
          description: "Continuity improvement measures are implemented through change management"
      activities:
        - name: "Identify continuity requirements"
          description: "Determine service continuity requirements at planned intervals taking into account SLA targets"
        - name: "Assess continuity risks"
          description: "Evaluate continuity risks covering emergencies, crises, and disasters affecting service delivery"
        - name: "Develop and maintain continuity plans"
          description: "Create continuity plans with recovery procedures, contact lists, and recovery targets"
        - name: "Test continuity plans"
          description: "Conduct regular tests of preventive and reactive continuity measures"
      kpis:
        - name: "Continuity plan coverage"
          formula: "(Critical services with current continuity plan / Total critical services) x 100"
          target: "100%"
        - name: "Continuity test adherence"
          formula: "(Continuity tests completed on schedule / Planned tests) x 100"
          target: "100%"

    - id: "PR08"
      name: "Capacity & Performance Management"
      framework_process_id: "PR5"
      purpose: "Ensure sufficient capacity and service performance to meet agreed service targets"
      scope: "Capacity requirements identification, current utilization tracking, future capacity planning, and performance monitoring"
      phase: "D"
      inputs:
        - name: "SLA performance targets"
          source: "PR02 Service Level Management"
        - name: "Service demand forecasts"
          source: "PR01 Service Portfolio Management"
        - name: "CI capacity data"
          source: "PR17 Service Configuration Management"
      outputs:
        - name: "Capacity plans"
          destination: "PR15 Change Management"
        - name: "Performance monitoring data"
          destination: "PR20 Measurement & Reporting"
        - name: "Capacity warnings and exceptions"
          destination: "PR11 Incident Management"
      interfaces:
        - process_id: "PR02"
          direction: "in"
          description: "SLA targets and predicted demand inform capacity requirements"
        - process_id: "PR15"
          direction: "out"
          description: "Capacity adjustments require change management approval"
      activities:
        - name: "Identify capacity and performance requirements"
          description: "Determine service capacity and performance requirements taking into account SLAs and predicted demand"
        - name: "Assess current capacity"
          description: "Identify current capacity and utilization across human, technical, and financial resources"
        - name: "Plan future capacity"
          description: "Plan capacity to meet identified requirements considering resource constraints"
        - name: "Monitor performance"
          description: "Analyse performance data to identify utilization trends, operational warnings, and exceptions"
      kpis:
        - name: "Capacity plan accuracy"
          formula: "Variance between predicted and actual capacity utilization"
          target: "<= 15% variance"
        - name: "Performance SLA compliance"
          formula: "(Performance metrics within SLA targets / Total measured metrics) x 100"
          target: ">= 95%"

    - id: "PR20"
      name: "Measurement & Reporting"
      framework_process_id: "PR3"
      purpose: "Specify reports on services and processes and ensure they are produced and delivered"
      scope: "Report identification, specification, production, and delivery covering service performance, process effectiveness, and detected nonconformities"
      phase: "D"
      inputs:
        - name: "Performance data from all processes"
          source: "All processes"
        - name: "SLA targets and service catalogue"
          source: "PR02 Service Level Management"
      outputs:
        - name: "Service and process reports"
          destination: "PR22 Relationship Management"
        - name: "Management review input reports"
          destination: "PR24 Continual Improvement"
        - name: "Trend and exception reports"
          destination: "All processes"
      interfaces:
        - process_id: "PR02"
          direction: "in"
          description: "SLA targets define reporting baselines"
        - process_id: "PR22"
          direction: "out"
          description: "Service reports are distributed to customers via relationship management"
        - process_id: "PR24"
          direction: "out"
          description: "Performance and nonconformity reports feed improvement decisions"
      activities:
        - name: "Identify required reports"
          description: "Determine which reports are needed covering service performance, significant events, and nonconformities"
        - name: "Specify reports"
          description: "Agree report specifications with recipients covering identity, purpose, audience, frequency, content, format, and delivery method"
        - name: "Produce and deliver reports"
          description: "Generate reports according to specifications and deliver them to defined recipients on schedule"
      kpis:
        - name: "Report delivery adherence"
          formula: "(Reports delivered on schedule / Total scheduled reports) x 100"
          target: "100%"
        - name: "Report specification coverage"
          formula: "(Reports with formal specification / Total reports produced) x 100"
          target: "100%"

    - id: "PR24"
      name: "Continual Improvement"
      framework_process_id: "PR14"
      purpose: "Plan, implement, and review improvements to services and processes"
      scope: "Identification, evaluation, prioritization, and implementation of improvement opportunities across the entire SMS"
      phase: "D"
      inputs:
        - name: "Assessment and audit results"
          source: "PR20 Measurement & Reporting"
        - name: "Management review outcomes"
          source: "SMS governance"
        - name: "Service review findings"
          source: "PR22 Relationship Management"
      outputs:
        - name: "Improvement initiatives"
          destination: "PR15 Change Management"
        - name: "Updated CSI register"
          destination: "All processes"
      interfaces:
        - process_id: "PR20"
          direction: "in"
          description: "Reports and measurements identify improvement opportunities"
        - process_id: "PR15"
          direction: "out"
          description: "Approved improvements requiring changes follow change management"
        - process_id: "PR01"
          direction: "out"
          description: "Improvement initiatives that affect the portfolio composition"
      activities:
        - name: "Identify improvement opportunities"
          description: "Register opportunities based on reports, assessments, audits, and management reviews"
        - name: "Evaluate improvement proposals"
          description: "Assess identified opportunities to decide on necessary actions and prioritization"
        - name: "Control improvement implementation"
          description: "Track the implementation of approved improvement actions in a consistent manner"
      kpis:
        - name: "Improvement implementation rate"
          formula: "(Improvements implemented on schedule / Total approved improvements) x 100"
          target: ">= 80%"
        - name: "Improvement identification rate"
          formula: "Number of new improvement opportunities registered per quarter"
          target: "Trending upward or stable at maturity"

role_model:
  roles:
    # ── Governance Roles ──────────────────────────────────────────────────

    - id: "sms-owner"
      name: "SMS Owner"
      description: "Senior accountable owner of the entire service management system. Sets key goals, approves SMS policy and scope, conducts management reviews, and provides overall direction. Must be a member of top management."
      processes:
        - "PR01"
        - "PR02"
        - "PR06"
        - "PR07"
        - "PR08"
        - "PR09"
        - "PR11"
        - "PR12"
        - "PR13"
        - "PR15"
        - "PR16"
        - "PR17"
        - "PR20"
        - "PR22"
        - "PR23"
        - "PR24"
      raci_default:
        PR01: "A"
        PR09: "A"
        PR24: "A"

    - id: "sms-manager"
      name: "SMS Manager"
      description: "Operational coordinator of the SMS. Acts as the primary contact for all operational concerns, maintains the service management plan, ensures processes are implemented according to policies, monitors SMS maturity, and reports to the SMS owner."
      processes:
        - "PR01"
        - "PR02"
        - "PR06"
        - "PR07"
        - "PR08"
        - "PR09"
        - "PR11"
        - "PR12"
        - "PR13"
        - "PR15"
        - "PR16"
        - "PR17"
        - "PR20"
        - "PR22"
        - "PR23"
        - "PR24"
      raci_default:
        PR01: "R"
        PR20: "R"
        PR24: "R"

    # ── Generic Role Patterns ─────────────────────────────────────────────

    - id: "process-owner"
      name: "Process Owner"
      description: "Accountable for a single ITSM process. Defines process goals and policies, nominates the process manager, approves process changes, allocates resources, and reviews process performance. One per process."
      processes:
        - "PR01"
        - "PR02"
        - "PR06"
        - "PR07"
        - "PR08"
        - "PR09"
        - "PR11"
        - "PR12"
        - "PR13"
        - "PR15"
        - "PR16"
        - "PR17"
        - "PR20"
        - "PR22"
        - "PR23"
        - "PR24"
      raci_default:
        PR01: "A"

    - id: "process-manager"
      name: "Process Manager"
      description: "Day-to-day operational leader of a process. Maintains the process definition, monitors execution, manages staff awareness and competence, handles escalations, and reports performance to the process owner."
      processes:
        - "PR01"
        - "PR02"
        - "PR06"
        - "PR07"
        - "PR08"
        - "PR09"
        - "PR11"
        - "PR12"
        - "PR13"
        - "PR15"
        - "PR16"
        - "PR17"
        - "PR20"
        - "PR22"
        - "PR23"
        - "PR24"
      raci_default:
        PR01: "R"

    - id: "case-owner"
      name: "Case Owner"
      description: "Responsible for a single case within a process — such as an incident, service request, problem, change, or release. Coordinates all activities through the case lifecycle and escalates exceptions."
      processes:
        - "PR02"
        - "PR11"
        - "PR12"
        - "PR13"
        - "PR15"
        - "PR16"
        - "PR22"
        - "PR23"
      raci_default:
        PR11: "R"

    - id: "process-staff-member"
      name: "Process Staff Member"
      description: "Performs operational tasks within a process according to defined procedures. Reports to case owners and process managers. May participate in multiple processes."
      processes:
        - "PR01"
        - "PR02"
        - "PR06"
        - "PR07"
        - "PR08"
        - "PR09"
        - "PR11"
        - "PR12"
        - "PR13"
        - "PR15"
        - "PR16"
        - "PR17"
        - "PR20"
        - "PR22"
        - "PR23"
        - "PR24"
      raci_default:
        PR11: "R"

    # ── Process-Specific Roles ────────────────────────────────────────────

    - id: "spm-manager"
      name: "SPM Manager"
      description: "Maintains the service portfolio, manages updates and lifecycle transitions, evaluates service proposals, reviews the portfolio at planned intervals, and ensures federation member contributions are identified."
      processes: ["PR01"]
      raci_default:
        PR01: "R"

    - id: "slm-manager"
      name: "SLM Manager"
      description: "Maintains the service catalogue, negotiates SLAs with customers, proposes and manages OLAs and UAs, ensures agreements are aligned and documented consistently."
      processes: ["PR02"]
      raci_default:
        PR02: "R"

    - id: "srm-manager"
      name: "SRM Manager"
      description: "Maintains the list of reports, reviews report specifications at planned intervals, and monitors production of accurate reports according to specifications."
      processes: ["PR20"]
      raci_default:
        PR20: "R"

    - id: "sacm-manager"
      name: "SACM Manager"
      description: "Identifies service availability and continuity requirements, produces and reviews availability and continuity plans, ensures improvement measures are implemented through change management."
      processes: ["PR06", "PR07"]
      raci_default:
        PR06: "R"
        PR07: "R"

    - id: "capm-manager"
      name: "CAPM Manager"
      description: "Identifies capacity and performance requirements, ensures capacity plans are produced and maintained, monitors utilization trends and operational exceptions."
      processes: ["PR08"]
      raci_default:
        PR08: "R"

    - id: "ism-manager"
      name: "ISM Manager"
      description: "Primary contact for information security issues. Monitors security activities including risk assessments, security event handling, and control implementation. Ensures security documentation is current."
      processes: ["PR09"]
      raci_default:
        PR09: "R"

    - id: "crm-manager"
      name: "CRM Manager"
      description: "Maintains the customer database, handles complaints, coordinates satisfaction surveys, and reviews service review results."
      processes: ["PR22"]
      raci_default:
        PR22: "R"

    - id: "suppm-manager"
      name: "SUPPM Manager"
      description: "Maintains the supplier database, monitors supplier performance according to the process, and manages supplier relationships."
      processes: ["PR23"]
      raci_default:
        PR23: "R"

    - id: "isrm-manager"
      name: "ISRM Manager"
      description: "Ensures all incidents and service requests are recorded with sufficient quality for traceability. Monitors resolution progress and identifies potential SLA violations."
      processes: ["PR11", "PR12"]
      raci_default:
        PR11: "R"
        PR12: "R"

    - id: "major-incident-manager"
      name: "Major Incident Manager"
      description: "Leads the response to major incidents, convenes resolution teams, manages stakeholder communication, drives service restoration, and coordinates post-incident review."
      processes: ["PR11"]
      raci_default:
        PR11: "R"

    - id: "pm-manager"
      name: "PM Manager"
      description: "Ensures incident trends are analysed, problems are recorded with sufficient quality, investigations yield results, known errors are documented, and problems are brought to closure."
      processes: ["PR13"]
      raci_default:
        PR13: "R"

    - id: "confm-manager"
      name: "CONFM Manager"
      description: "Maintains the scope and granularity of the CMDB, defines CI and relationship types, plans and ensures configuration verifications are conducted and nonconformities addressed."
      processes: ["PR17"]
      raci_default:
        PR17: "R"

    - id: "chm-manager"
      name: "CHM Manager"
      description: "Plans and moderates CAB meetings, maintains standard change descriptions, ensures RFCs are processed effectively, monitors change progress, and reviews change records for trends."
      processes: ["PR15"]
      raci_default:
        PR15: "R"

    - id: "change-advisory-board"
      name: "Change Advisory Board"
      description: "Evaluates non-standard changes considering benefits, risks, impact, feasibility, and cost. Decides on approval and identifies candidates for pre-approval. Composed of relevant stakeholders."
      processes: ["PR15"]
      raci_default:
        PR15: "C"

    - id: "rdm-manager"
      name: "RDM Manager"
      description: "Maintains overall release planning and release cycles, manages deployment strategies, applies strategies to component groups, and reviews deployed releases for success."
      processes: ["PR16"]
      raci_default:
        PR16: "R"

    - id: "csi-manager"
      name: "CSI Manager"
      description: "Manages the CSI register, evaluates improvement proposals, coordinates improvement implementation, and tracks improvement outcomes."
      processes: ["PR24"]
      raci_default:
        PR24: "R"

general_requirements:
  requirements:
    - id: "GR1"
      name: "Top Management Commitment & Accountability"
      description: "Top management shall demonstrate commitment by assigning an SMS owner, defining and approving a service management policy, and conducting management reviews at planned intervals."
      sub_requirements:
        - "GR1.1: Assign a member of top management as accountable SMS owner"
        - "GR1.2: Define a general service management policy including goals, commitment to improvement, and service/process orientation"
        - "GR1.3: Conduct management reviews at planned intervals"
      evidence:
        - document_type: "sms-policy"
          section: "Leadership commitment and SMS ownership"
        - document_type: "process-definition"
          section: "Management review procedure"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: "GR2"
      name: "Documentation Management"
      description: "The SMS shall be documented including scope statement, policy, plan, process definitions, and process outputs. Documentation shall be controlled with defined creation, approval, review, versioning, and distribution procedures."
      sub_requirements:
        - "GR2.1: Document SMS key elements (scope, policy, plan, process definitions)"
        - "GR2.2: Create and maintain documented process definitions with goals, inputs, activities, outputs, roles, interfaces, policies, and procedures"
        - "GR2.3: Document key outputs and record execution of key activities"
        - "GR2.4: Control documentation addressing creation, approval, distribution, review, and versioning"
      evidence:
        - document_type: "sms-policy"
          section: "Documentation management policy"
        - document_type: "process-definition"
          section: "Process definitions for all processes"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: "GR3"
      name: "Scope Definition & Stakeholder Management"
      description: "Stakeholders shall be identified and their needs analysed. The SMS scope shall be defined considering stakeholder analysis results, including legal, regulatory, and contractual requirements."
      sub_requirements:
        - "GR3.1: Identify stakeholders and analyse their needs and expectations including legal and regulatory requirements"
        - "GR3.2: Define the SMS scope taking into account stakeholder analysis results"
      evidence:
        - document_type: "sms-policy"
          section: "SMS scope statement"
        - document_type: "process-definition"
          section: "Stakeholder register"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: "GR4"
      name: "Planning"
      description: "A service management plan shall be created covering goals, timing, roles, training, and technology. Process-specific plans shall align to the overall plan."
      sub_requirements:
        - "GR4.1: Create and maintain a service management plan with goals, timing, roles, training, and technology"
        - "GR4.2: Align process-specific plans to the overall service management plan"
      evidence:
        - document_type: "sms-policy"
          section: "Service management plan"
        - document_type: "process-definition"
          section: "Process-specific plans"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: "GR5"
      name: "Implementation Support"
      description: "The service management plan shall be implemented. Defined processes shall be followed in practice and adherence to policies and procedures shall be enforced."
      sub_requirements:
        - "GR5.1: Implement the service management plan"
        - "GR5.2: Enforce adherence to defined processes, policies, and procedures"
      evidence:
        - document_type: "process-definition"
          section: "Implementation evidence and compliance records"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: "GR6"
      name: "Monitoring & Review"
      description: "SMS and process effectiveness shall be measured using KPIs. Assessments and audits shall be conducted at planned intervals to evaluate maturity and conformity."
      sub_requirements:
        - "GR6.1: Measure and evaluate SMS effectiveness using suitable KPIs"
        - "GR6.2: Conduct assessments or audits at planned intervals"
      evidence:
        - document_type: "process-definition"
          section: "KPI definitions and measurement procedures"
        - document_type: "completeness-report"
          section: "Maturity assessment results"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: "GR7"
      name: "Continual Improvement"
      description: "Nonconformities shall be identified and corrective actions taken. The SMS policy, plan, and all processes shall be subject to continual improvement through the CSI process."
      sub_requirements:
        - "GR7.1: Identify nonconformities and take corrective actions to prevent recurrence"
        - "GR7.2: Subject the entire SMS to continual improvement via the CSI process"
      evidence:
        - document_type: "process-definition"
          section: "CSI register and improvement records"
        - document_type: "completeness-report"
          section: "Improvement tracking"
      tier_applicability:
        t1: true
        t2: true
        t3: true

