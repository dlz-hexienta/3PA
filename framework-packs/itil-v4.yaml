  roles:
    # ── Governance Roles ──────────────────────────────────────────────
    - id: GOV-01
      name: "SMS Owner"
      description: "Overall accountability for the SMS, ensures top management commitment, approves SMS policy, conducts management reviews"
      processes: [PR01, PR02, PR03, PR04, PR05, PR06, PR07, PR08, PR09, PR10, PR11, PR12, PR13, PR14, PR15, PR16, PR17, PR18, PR19, PR20, PR21, PR22, PR23, PR24]
