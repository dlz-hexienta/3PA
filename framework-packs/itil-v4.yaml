      raci_default:
        PR19: R

    - id: PR19-R03
      name: "Knowledge Asset Owner"
      description: "Accountable for quality and currency of specific knowledge assets — reviews content, approves updates"
      processes: [PR19]
      raci_default:
        PR19: A

    # ── PR20 Measurement & Reporting ──────────────────────────────────
    - id: PR20-R01
      name: "Measurement & Reporting Manager"
      description: "Manages measurement and reporting — defines metrics framework, produces management reports, ensures data quality"
      processes: [PR02, PR06, PR08, PR14, PR20, PR24]
      raci_default:
        PR20: A

    - id: PR20-R02
      name: "Measurement & Reporting Team Member"
      description: "Collects data, produces reports, maintains dashboards, supports data analysis"
      processes: [PR20]
      raci_default:
        PR20: R

    - id: PR20-R03
      name: "Report Design Authority"
      description: "Designs report specifications — ensures reports meet stakeholder needs, validates data sources"
      processes: [PR20]
      raci_default:
        PR20: A

    # ── PR21 Risk Management ──────────────────────────────────────────
    - id: PR21-R01
      name: "Risk Management Committee Member"
      description: "Governs risk framework — analyses environment, documents capacity and appetite, establishes policy"
      processes: [PR07, PR09, PR15, PR21, PR24]
      raci_default:
        PR21: A

    - id: PR21-R02
      name: "Risk Owner"
      description: "Accountable for a specific risk — ensures identification, analysis, evaluation, and treatment within timeframes"
      processes: [PR21]
      raci_default:
        PR21: R

    - id: PR21-R03
      name: "Risk Auditor"
      description: "Conducts risk audits — assesses effectiveness, verifies controls, ensures compliance, provides assurance"
      processes: [PR21]
      raci_default:
        PR21: C

    # ── PR22 Relationship Management ──────────────────────────────────
    - id: PR22-R01
      name: "Relationship Manager"
      description: "Manages stakeholder relationships — maintains satisfaction, handles complaints, facilitates communication"
      processes: [PR01, PR02, PR10, PR12, PR22, PR23]
      raci_default:
        PR22: R

    - id: PR22-R02
      name: "Relationship Management Team Member"
      description: "Supports relationship activities, manages channels, collects satisfaction data, coordinates ordering"
      processes: [PR22]
      raci_default:
        PR22: R

    - id: PR22-R03
      name: "Customer Relationship Representative"
      description: "Designated contact for a customer or group — manages day-to-day relationship, escalates issues"
      processes: [PR22]
      raci_default:
        PR22: R

    # ── PR23 Supplier Management ──────────────────────────────────────
    - id: PR23-R01
      name: "Supplier Manager"
      description: "Manages supplier relationships — negotiates contracts, evaluates performance, manages disputes"
      processes: [PR01, PR02, PR03, PR16, PR22, PR23]
      raci_default:
        PR23: A

    - id: PR23-R02
      name: "Supplier Management Team Member"
      description: "Supports supplier management, monitors compliance, maintains records, coordinates operations"
      processes: [PR23]
      raci_default:
        PR23: R

    - id: PR23-R03
      name: "Supplier Relationship Representative"
      description: "Designated contact for a specific supplier — manages day-to-day relationship, monitors delivery"
      processes: [PR23]
      raci_default:
        PR23: R

    # ── PR24 Continual Improvement ────────────────────────────────────
    - id: PR24-R01
      name: "CSI Manager"
      description: "Manages continual improvement — maintains CSI register, evaluates proposals, coordinates implementation"
      processes: [PR01, PR02, PR20, PR24]
      raci_default:
        PR24: R

    - id: PR24-R02
      name: "Continual Improvement Team Member"
      description: "Supports improvement activities, analyses opportunities, tracks progress"
      processes: [PR24]
      raci_default:
        PR24: R

    - id: PR24-R03
      name: "Improvement Owner"
      description: "Accountable for a specific improvement initiative — manages implementation, tracks benefits, reports outcomes"
      processes: [PR24]
      raci_default:
        PR24: A

# ══════════════════════════════════════════════════════════════════════
# GENERAL REQUIREMENTS
# ══════════════════════════════════════════════════════════════════════

general_requirements:
  requirements:
    # ── Guiding Principles (GP1–GP7) ──────────────────────────────────
    - id: GP1
      name: "Focus on Value"
      description: "Everything the organization does should link back to value for stakeholders. Consider the consumer experience, map every activity to stakeholder value, and understand what the consumer values rather than what the provider delivers"
      evidence:
        - document_type: sms-policy
          section: "Value Alignment Statement"
        - document_type: process-definition
          section: "Purpose and Value Contribution"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: GP2
      name: "Start Where You Are"
      description: "Assess the current state objectively before creating something new. Leverage existing services, processes, people, and tools — do not discard them without understanding their value"
      evidence:
        - document_type: sms-policy
          section: "Current State Assessment"
        - document_type: process-definition
          section: "Baseline and Starting Point"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: GP3
      name: "Progress Iteratively with Feedback"
      description: "Resist the temptation to do everything at once. Organize work into manageable sections, use feedback loops to ensure actions remain focused and appropriate"
      evidence:
        - document_type: sms-policy
          section: "Iterative Improvement Approach"
        - document_type: process-definition
          section: "Feedback Mechanisms"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: GP4
      name: "Collaborate and Promote Visibility"
      description: "Work across boundaries, share information openly, and build trust. Insufficient visibility leads to poor decision-making. Involve the right people at the right time"
      evidence:
        - document_type: sms-policy
          section: "Collaboration and Transparency"
        - document_type: process-definition
          section: "Stakeholder Engagement"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: GP5
      name: "Think and Work Holistically"
      description: "No service, practice, or component stands alone. Consider the whole system — understand how all parts interact and how changes in one area affect others"
      evidence:
        - document_type: sms-policy
          section: "Holistic Service Management"
        - document_type: process-definition
          section: "Process Interfaces and Dependencies"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: GP6
      name: "Keep It Simple and Practical"
      description: "Use the minimum number of steps to accomplish an objective. Eliminate waste, use outcome-based thinking, and avoid overly complex processes"
      evidence:
        - document_type: sms-policy
          section: "Simplicity and Proportionality"
        - document_type: process-definition
          section: "Process Efficiency"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: GP7
      name: "Optimize and Automate"
      description: "Optimize human and technical resources before automating. Automation should enhance efficiency, reduce errors, and free people for complex tasks"
      evidence:
        - document_type: sms-policy
          section: "Automation Strategy"
        - document_type: process-definition
          section: "Automation Opportunities"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    # ── Four Dimensions (D1–D4) ───────────────────────────────────────
    - id: D1
      name: "Organizations and People"
      description: "Ensure formal structures, roles, authority, communication, and culture support the strategy. Address competencies, capacity, staffing, and organizational design"
      evidence:
        - document_type: raci-matrix
          section: "Role Assignments"
        - document_type: process-definition
          section: "Roles and Responsibilities"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: D2
      name: "Information and Technology"
      description: "Address the information and technology needed to manage services — including knowledge, tools, data, and the technologies required by the services themselves"
      evidence:
        - document_type: process-definition
          section: "Information and Technology Requirements"
        - document_type: sms-policy
          section: "Technology Strategy"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: D3
      name: "Partners and Suppliers"
      description: "Consider every organization's relationships with other organizations involved in service design, development, deployment, delivery, support, and improvement"
      evidence:
        - document_type: process-definition
          section: "Supplier and Partner Dependencies"
        - document_type: sms-policy
          section: "Sourcing Strategy"
      tier_applicability:
        t1: true
        t2: true
        t3: true

    - id: D4
      name: "Value Streams and Processes"
      description: "Define how the various parts of the organization work together to enable value creation through defined models, workflows, controls, and procedures"
      evidence:
        - document_type: process-definition
          section: "Value Stream Mapping"
        - document_type: procedure
          section: "Process Workflows"
      tier_applicability:
        t1: true
        t2: true
        t3: true

# ══════════════════════════════════════════════════════════════════════
# COMPLIANCE MAPPING
# ══════════════════════════════════════════════════════════════════════

compliance_mapping:
  standards:
    - standard: "ISO/IEC 20000-1:2018"
      # ITIL v4 does not provide a formal clause-by-clause mapping like FitSM.
      # The following mapping is indicative, based on practice alignment to SMS requirements.
      clauses:
        - clause: "4"
          title: "Context of the organization"
          processes: [PR01, PR22]
          documents: [sms-policy, scoping-brief]
        - clause: "5"
          title: "Leadership"
          processes: [PR01, PR24]
          documents: [sms-policy]
        - clause: "6"
          title: "Planning"
          processes: [PR01, PR21, PR24]
          documents: [sms-policy, process-definition]
        - clause: "7"
          title: "Support of the service management system"
          processes: [PR17, PR19, PR20]
          documents: [process-definition, procedure]
        - clause: "8.2"
          title: "Service portfolio"
          processes: [PR01]
          documents: [process-definition, service-catalogue]
        - clause: "8.3"
          title: "Relationship and agreement"
          processes: [PR02, PR05, PR22, PR23]
          documents: [process-definition, sla-template]
        - clause: "8.4"
          title: "Supply and demand"
          processes: [PR08, PR23]
          documents: [process-definition]
        - clause: "8.5"
          title: "Service design, build and transition"
          processes: [PR04, PR15, PR16]
          documents: [process-definition, procedure]
        - clause: "8.6"
          title: "Resolution and fulfilment"
          processes: [PR10, PR11, PR12, PR13]
          documents: [process-definition, procedure]
        - clause: "8.7"
          title: "Service assurance"
          processes: [PR06, PR07, PR09, PR14]
          documents: [process-definition, procedure]
        - clause: "9"
          title: "Performance evaluation"
          processes: [PR20, PR24]
          documents: [process-definition, kpi-definition]
        - clause: "10"
          title: "Improvement"
          processes: [PR24]
          documents: [process-definition, csi-register]

# ══════════════════════════════════════════════════════════════════════
# INTAKE QUESTIONS
# ══════════════════════════════════════════════════════════════════════

intake_questions:
  questions:
    - question: "Is the organization pursuing or planning ITIL 4 certification (Foundation, Managing Professional, Strategic Leader)?"
      rationale: "Certification goals influence terminology rigour, practice depth, and documentation formality"
      signal: "compliance"

    - question: "Which ITIL 4 practices are currently adopted, and at what maturity level?"
      rationale: "Determines starting point for practice documentation and identifies gaps in the SVS"
      signal: "processes"

    - question: "Has the organization defined its Service Value System and Service Value Chain activities?"
      rationale: "SVS adoption level determines how practices are integrated and how value streams are mapped"
      signal: "processes"

    - question: "Which of the four dimensions (Organizations and People, Information and Technology, Partners and Suppliers, Value Streams and Processes) present the greatest challenges?"
      rationale: "Identifies areas requiring deeper documentation and more detailed design considerations"
      signal: "complexity"

    - question: "Does the organization integrate ITIL with other frameworks (DevOps, Agile, Lean, COBIT, SIAM)?"
      rationale: "Framework integration affects terminology alignment, process boundaries, and documentation scope"
      signal: "complexity"

    - question: "Are Practice Success Factors (PSFs) defined and measured for existing practices?"
      rationale: "PSF adoption indicates practice maturity and influences KPI documentation depth"
      signal: "processes"

    - question: "How are value streams currently designed — are they mapped end-to-end or practice-by-practice?"
      rationale: "Value stream maturity determines how process interfaces and handoffs are documented"
      signal: "processes"

    - question: "What is the organization's approach to continual improvement — ad hoc, structured, or embedded?"
      rationale: "Improvement maturity determines how the CI practice and register are documented"
      signal: "complexity"

# ══════════════════════════════════════════════════════════════════════
# REQUIREMENT PROMPTS
# ══════════════════════════════════════════════════════════════════════

requirement_prompts:
  prompts:
    - category: "1"
      prompt: "Identify Practice Success Factors (PSFs) for each in-scope practice and determine which are highest priority"
      framework_context: "ITIL 4 defines PSFs as complex functional components necessary for a practice to fulfil its purpose — they drive KPI selection and practice design"

    - category: "2"
      prompt: "Map each in-scope practice to the Service Value Chain activities it contributes to (Plan, Improve, Engage, Design & Transition, Obtain/Build, Deliver & Support)"
      framework_context: "ITIL 4 practices contribute to SVC activities — this mapping ensures documentation covers how each practice creates value"

    - category: "3"
      prompt: "For each process definition, document how all four dimensions (Organizations and People, Information and Technology, Partners and Suppliers, Value Streams and Processes) are addressed"
      framework_context: "ITIL 4 requires holistic consideration of all four dimensions for every practice and service"

    - category: "4"
      prompt: "Determine whether ITIL 4 practice terminology or traditional process terminology will be used in documentation"
      framework_context: "ITIL 4 uses 'practice' rather than 'process' — organizations must decide on consistent terminology for their documentation corpus"

    - category: "5"
      prompt: "Design value streams for key service scenarios (new service onboarding, incident resolution, service request fulfilment, change implementation)"
      framework_context: "ITIL 4 emphasizes end-to-end value streams over isolated process flows — documentation should reflect this holistic view"

    - category: "6"
      prompt: "Define the organization's approach to each of the seven guiding principles and document how they apply to service management"
      framework_context: "The guiding principles are fundamental to ITIL 4 — they should be reflected in the SMS policy and all process documentation"

    - category: "7"
      prompt: "Identify which practices require capability levels beyond the current state and define target maturity levels"
      framework_context: "ITIL 4 Practice Guides define capability levels — these should be used to set improvement targets and prioritize documentation effort"

    - category: "8"
      prompt: "Document how the organization's governance structure aligns with the ITIL 4 Service Value System components (governance, SVS, SVC, practices, CI)"
      framework_context: "The SVS is the overarching framework — documentation should show how organizational governance maps to SVS governance"

# ══════════════════════════════════════════════════════════════════════
# DOCUMENT SECTION TEMPLATES
# ══════════════════════════════════════════════════════════════════════

document_section_templates:
  templates:
    - document_type: sms-policy
      sections:
        - heading: "Service Value System Alignment"
          guidance: "Describe how the SMS aligns with the ITIL 4 Service Value System — including the relationship between organizational governance, the SVS, guiding principles, and continual improvement. State which SVS components are adopted and how they interact"
          tier: t1
        - heading: "Guiding Principles Adoption"
          guidance: "Document the organization's commitment to each of the seven ITIL 4 guiding principles (Focus on Value, Start Where You Are, Progress Iteratively with Feedback, Collaborate and Promote Visibility, Think and Work Holistically, Keep It Simple and Practical, Optimize and Automate). For each principle, state how it applies to the organization's service management approach"
          tier: t1
        - heading: "Four Dimensions Governance"
          guidance: "Describe how the organization ensures all four dimensions of service management are addressed in governance decisions — Organizations and People, Information and Technology, Partners and Suppliers, Value Streams and Processes"
          tier: t2
        - heading: "Service Value Chain Activities"
          guidance: "Map the organization's service management activities to the six SVC activities (Plan, Improve, Engage, Design and Transition, Obtain/Build, Deliver and Support) and describe how value flows through the chain"
          tier: t3

    - document_type: process-definition
      sections:
        - heading: "Practice Success Factors"
          guidance: "Document the Practice Success Factors (PSFs) for this practice — the complex functional components necessary for the practice to fulfil its purpose. For each PSF, describe what it means in the organization's context and how achievement will be measured"
          tier: t1
        - heading: "Value Chain Mapping"
          guidance: "Map this practice to the Service Value Chain activities it contributes to. For each SVC activity, describe the practice's specific contribution and the value it creates"
          tier: t2
        - heading: "Four Dimensions Considerations"
          guidance: "Document how this practice addresses each of the four dimensions: what organizational structures and roles are needed (D1), what information and technology are required (D2), which partners and suppliers are involved (D3), and what value streams and processes are defined (D4)"
          tier: t2
        - heading: "Practice Capability Level"
          guidance: "Assess and document the current and target capability level for this practice using the ITIL 4 capability model. Identify gaps and improvement actions needed to achieve the target level"
          tier: t3

    - document_type: completeness-report
      sections:
        - heading: "Practice Maturity Assessment"
          guidance: "Provide a maturity assessment for each in-scope ITIL 4 practice against the capability model. Include current level, target level, key gaps, and priority improvement actions. Reference Practice Success Factors as the primary assessment criteria"
          tier: t2
        - heading: "Value Stream Coverage"
          guidance: "Assess whether the documented practices adequately cover all key value streams. Identify any value stream segments that lack sufficient practice support or documentation"
          tier: t3

# ══════════════════════════════════════════════════════════════════════
# QUALITY CHECKS
# ══════════════════════════════════════════════════════════════════════

quality_checks:
  checks:
    - gate: G3
      check: "All 24 ITIL 4 practices in scope have corresponding process definitions with PSFs documented"
      pass_criteria: "Every in-scope practice has a process definition document that includes a Practice Success Factors section with at least one PSF defined"
      tier: t1

    - gate: G3
      check: "Practice coverage spans all four phases (Foundation, Agreements, Operations, Assurance)"
      pass_criteria: "At least one process definition exists for each of the four interdependency phases (A, B, C, D)"
      tier: t1

    - gate: G4
      check: "Practice Success Factors are documented with measurable indicators"
      pass_criteria: "Each documented PSF has at least one associated KPI or metric that can be measured to assess PSF achievement"
      tier: t2

    - gate: G4
      check: "Four dimensions are addressed in all process definitions"
      pass_criteria: "Every process definition includes consideration of Organizations and People, Information and Technology, Partners and Suppliers, and Value Streams and Processes"
      tier: t2

    - gate: G5
      check: "Service Value Chain alignment is consistent across all practice documents"
      pass_criteria: "SVC activity mappings are consistent — no practice claims contribution to an SVC activity without corresponding activities and interfaces documented"
      tier: t2

    - gate: G5
      check: "Guiding principles are consistently reflected in SMS policy and process definitions"
      pass_criteria: "SMS policy references all seven guiding principles; process definitions demonstrate principle application through documented activities and controls"
      tier: t1

    - gate: G7
      check: "Value stream integrity — end-to-end value streams are documented and practice handoffs are defined"
      pass_criteria: "At least one value stream is documented end-to-end with clear practice contributions, inputs, outputs, and handoff points identified"
      tier: t3

    - gate: G7
      check: "Process interfaces form complete value chains without gaps"
      pass_criteria: "Every process output has a receiving process identified; every process input has a source process identified; no orphan interfaces exist"
      tier: t2

    - gate: G8
      check: "Practice capability levels are assessed and improvement targets are set"
      pass_criteria: "Each practice has a documented current capability level and target level with identified gaps and improvement actions"
      tier: t3

    - gate: G8
      check: "ITIL 4 terminology is used consistently throughout the documentation corpus"
      pass_criteria: "All documents use ITIL 4 preferred terms as defined in the terminology section; no conflicting terminology from other frameworks appears without explicit alias notation"
      tier: t1

# ══════════════════════════════════════════════════════════════════════
# TERMINOLOGY
# ══════════════════════════════════════════════════════════════════════

terminology:
  terms:
    - term: "Service Value System (SVS)"
      definition: "A model representing how all the components and activities of an organization work together to facilitate value creation. The SVS includes guiding principles, governance, service value chain, practices, and continual improvement"
      aliases: ["SMS (FitSM)"]
      context: "The overarching framework within which all service management activities operate"

    - term: "Service Value Chain (SVC)"
      definition: "A set of six interconnected activities that an organization performs to deliver a valuable product or service: Plan, Improve, Engage, Design and Transition, Obtain/Build, Deliver and Support"
      aliases: []
      context: "The operating model for value creation — practices contribute to SVC activities"

    - term: "Practice"
      definition: "A set of organizational resources designed for performing work or accomplishing an objective. ITIL 4 defines 34 management practices organized into general, service, and technical categories"
      aliases: ["process (FitSM)", "process area"]
      context: "ITIL 4 uses 'practice' instead of 'process' to emphasize the broader scope including people, technology, and partners"

    - term: "Four Dimensions of Service Management"
      definition: "Four perspectives that must be considered for effective service management: Organizations and People, Information and Technology, Partners and Suppliers, Value Streams and Processes"
      aliases: []
      context: "Every practice and service must address all four dimensions for holistic management"

    - term: "Guiding Principles"
      definition: "Seven recommendations that guide an organization in all circumstances: Focus on Value, Start Where You Are, Progress Iteratively with Feedback, Collaborate and Promote Visibility, Think and Work Holistically, Keep It Simple and Practical, Optimize and Automate"
      aliases: []
      context: "Universal principles applicable regardless of changes in goals, strategies, or management structure"

    - term: "Value Stream"
      definition: "A series of steps an organization undertakes to create and deliver products and services to consumers. A value stream is a combination of the organization's value chain activities"
      aliases: []
      context: "Value streams map the end-to-end flow of value creation for specific scenarios"

    - term: "Service Relationship"
      definition: "A cooperation between a service provider and service consumer that includes service provision, service consumption, and service relationship management"
      aliases: []
      context: "The overarching relationship model encompassing all interactions between provider and consumer"

    - term: "Service Offering"
      definition: "A formal description of one or more services designed to address the needs of a target consumer group. May include goods, access to resources, and service actions"
      aliases: ["service description (FitSM)"]
      context: "How services are presented to consumers in the service catalogue"

    - term: "Utility"
      definition: "The functionality offered by a product or service to meet a particular need. Summarized as what the service does — whether it is fit for purpose"
      aliases: ["fitness for purpose"]
      context: "One half of the value equation — utility addresses functional requirements"

    - term: "Warranty"
      definition: "Assurance that a product or service will meet agreed requirements. Summarized as how the service performs — whether it is fit for use"
      aliases: ["fitness for use"]
      context: "The other half of the value equation — warranty addresses availability, capacity, continuity, and security"

    - term: "Outcome"
      definition: "A result for a stakeholder enabled by one or more outputs. Outcomes are what the consumer actually achieves"
      aliases: []
      context: "Distinguish from output — outcomes represent the value delivered, not the deliverable itself"

    - term: "Output"
      definition: "A tangible or intangible deliverable of an activity. Outputs contribute to outcomes but are not outcomes themselves"
      aliases: []
      context: "Products and services deliver outputs that enable consumer outcomes"

    - term: "Cost"
      definition: "The amount of money spent on a specific activity or resource. In service management, costs include the price the consumer pays and the cost of utilizing the service"
      aliases: []
      context: "Value assessment includes both costs removed and costs imposed by the service"

    - term: "Risk (Service Context)"
      definition: "A possible event that could cause harm or loss, or make it more difficult to achieve objectives. Includes both threats (negative) and opportunities (positive)"
      aliases: []
      context: "Value assessment includes both risks removed and risks imposed by the service"

    - term: "Sponsor"
      definition: "A person who authorizes budget for service consumption. The sponsor is a key stakeholder role distinct from customer and user"
      aliases: []
      context: "Part of the service consumer role model — sponsors authorize, customers define requirements, users consume"

    - term: "Customer"
      definition: "A person who defines the requirements for a service and takes responsibility for the outcomes of service consumption"
      aliases: []
      context: "Distinct from user (who uses the service) and sponsor (who authorizes budget)"

    - term: "User"
      definition: "A person who uses services. Users are distinct from customers — a customer may define requirements on behalf of many users"
      aliases: []
      context: "The person who actually interacts with and consumes the service"

    - term: "Service Provider"
      definition: "An organization that provides services to consumers. May be internal (shared services) or external"
      aliases: ["IT service provider (FitSM)"]
      context: "One side of the service relationship — the provider creates value through service delivery"

    - term: "Service Consumer"
      definition: "A role that includes the sub-roles of customer, user, and sponsor. The service consumer receives services from the provider"
      aliases: ["customer (FitSM, simplified)"]
      context: "The collective term for all roles on the consuming side of the service relationship"

    - term: "Practice Success Factor (PSF)"
      definition: "A complex functional component of a practice that is required for the practice to fulfil its purpose. PSFs are measured through KPIs"
      aliases: []
      context: "Used to assess practice effectiveness and set improvement targets"

    - term: "Service Design Package (SDP)"
      definition: "A document or set of documents defining all aspects of an IT service and its requirements through each lifecycle stage"
      aliases: ["service specification (FitSM)"]
      context: "The primary design artefact — addresses all four dimensions with CX/UX at the centre"

    - term: "Continual Improvement Register (CIR)"
      definition: "A database or structured document used to track and manage improvement opportunities and initiatives throughout their lifecycle"
      aliases: ["CSI register"]
      context: "The central repository for all improvement ideas, from identification through implementation to evaluation"

    - term: "Known Error Database (KEDB)"
      definition: "A database containing all known error records with documented root causes and workarounds, consumed by incident management"
      aliases: []
      context: "Maintained by problem management, used by incident management to accelerate resolution"

    - term: "Configuration Management Database (CMDB)"
      definition: "A database used to store configuration records throughout their lifecycle. The CMDB records the attributes of CIs and relationships between them"
      aliases: []
      context: "The primary data store for configuration management — feeds impact analysis, change assessment, and root cause investigation"

    - term: "Change Enablement"
      definition: "The ITIL 4 practice name for change management — emphasizes enabling changes rather than controlling them"
      aliases: ["change management (FitSM)", "change control"]
      context: "ITIL 4 renamed the practice to shift focus from gatekeeping to enabling successful changes"

    - term: "Incident Model"
      definition: "A repeatable, predefined approach to managing a particular type of incident — describes steps, roles, timescales, and escalation paths"
      aliases: []
      context: "Enables consistent, rapid resolution by encoding proven resolution paths"

    - term: "Service Request Model"
      definition: "A repeatable, predefined approach to the fulfilment of a particular type of service request — documents procedures, roles, automation, and third-party involvement"
      aliases: ["standardised service request (FitSM)"]
      context: "Request models are produced during design, tested, and deployed alongside service components"

